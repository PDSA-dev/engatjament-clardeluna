function showToast(msg,type){

// Découpe l'année en 3 trimestres égaux continus + 1 été
// T1+T2+T3 couvrent de la rentrée au 30 juin (sans tenir compte des vacances)
function buildTRI(rentreeISO, anneeLabel){
  var d0=new Date(rentreeISO+"T00:00:00");
  var yr=d0.getFullYear(); // ex: 2025
  // Fin d'année scolaire = 30 juin de l'année suivante
  var finAnnee=new Date((yr+1)+"-06-30T23:59:59");
  // Durée totale en ms
  var dur=finAnnee-d0;
  var t=Math.floor(dur/3); // durée d'un trimestre en ms
  var t1s=new Date(d0);
  var t1e=new Date(d0.getTime()+t-1);
  var t2s=new Date(t1e.getTime()+1);
  var t2e=new Date(d0.getTime()+2*t-1);
  var t3s=new Date(t2e.getTime()+1);
  var t3e=new Date(finAnnee);
  // T4 : été (1er juillet → 31 août)
  var t4s=new Date((yr+1)+"-07-01T00:00:00");
  var t4e=new Date((yr+1)+"-08-31T23:59:59");
  function fmt(d){return d.toLocaleDateString("fr-FR",{day:"2-digit",month:"short",year:"2-digit"});}
  return[
    {n:1,l:"T1",s:t1s,e:t1e,m:fmt(t1s)+" → "+fmt(t1e)},

// ── UTILITAIRES ───────────────────────────────
function nrm(s){return String(s||"").replace(/æ/gi,"ae").replace(/œ/gi,"oe").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\s+/g," ").trim();}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function rnd(v){return Math.round(v*2)/2;}
function rnd2(v){var r=Math.round(v*100)/100;return r%1===0?r:r;}
function pct(v,m){return Math.min(100,Math.round(v/m*100));}
function getTri(ts){var d=new Date(ts);for(var i=0;i<TRI.length;i++)if(d>=TRI[i].s&&d<=TRI[i].e)return TRI[i].n;return null;}
function curTri(){var n=new Date();for(var i=0;i<TRI.length;i++)if(n>=TRI[i].s&&n<=TRI[i].e)return TRI[i].n;return 4;}
function hAtt(){var n=new Date(),t=0;for(var i=0;i<TRI.length;i++){var tr=TRI[i];if(n>tr.e)t+=10;else if(n>=tr.s)t+=(n-tr.s)/(tr.e-tr.s)*10;}return Math.min(OBJ,t);}
// ── NOM DE FAMILLE depuis nom d'élève ─────────
function familyKey(eleve){
  // Prend le premier mot en majuscules (nom de famille)
  var parts=String(eleve||"").trim().split(" ");
  return parts[0].toUpperCase();
}
// ── NORMALISATION PRÉNOM PARENT ──────────────
// "Paul", "Paulo", "Paul Alves", "paulo alves" → même prénom
// Extrait le prénom principal (1er mot significatif)
function chequeKey(fk,prenom){return fk+"_"+nrm(prenom).replace(/\s+/g,"").slice(0,8);}
function chequesH(fk,prenom){return (CHEQUES_MAP[chequeKey(fk,prenom)]||0)*H_CHEQUE;}
function normPrenom(s){
  var p=nrm((String(s||"").split(/\s*[&\+]\s*|\s+et\s+/)[0]||"").trim());
  // Prend le 1er mot de plus de 2 lettres (ignore titres courts)
  var words=p.split(/\s+/).filter(function(w){return w.length>2;});
  return (words[0]||p.slice(0,6)).slice(0,6);
}
// Deux chaînes partagent-elles le même prénom principal ?
var PRENOM_ALIASES={
  "beengere":"berengere","beerngere":"berengere","berengere":"berengere",
  "joanda":"jeandanie","jeandani":"jeandanie","jeandanie":"jeandanie",
  "jean yve":"emmanuell","jeanyves":"emmanuell","jean-yve":"emmanuell",
  "houlesje":"emmanuell","hude emm":"emmanuell","hudeemman":"emmanuell",
  "emmanuell":"emmanuell","emmanuelle":"emmanuell",
  "laetitia":"laetiti","laetiti":"laetiti",
  "jerome":"jerom","jerom":"jerom",
  "cyrille b":"cyrille","cyrillebes":"cyrille",
  "julie pas":"julie","juliepasto":"julie",
  "siham, b":"siham","sihambeno":"siham",
  "paulo":"paul","paul":"paul"
};
function canonPrenom(s){
  var raw=nrm(String(s||""));
  var n=raw.replace(/[\s-]/g,"").slice(0,10);
  for(var l=10;l>=4;l--){
    var k=n.slice(0,l);if(PRENOM_ALIASES[k])return PRENOM_ALIASES[k];
    var k2=raw.slice(0,l);if(PRENOM_ALIASES[k2])return PRENOM_ALIASES[k2];
  }
  return n.slice(0,6);
}
function prenomMatch(a,b){
  var na=normPrenom(a),nb=normPrenom(b);
  if(!na||!nb||na.length<3||nb.length<3)return false;
  if(na===nb)return true;
  var ca=canonPrenom(a),cb=canonPrenom(b);
  if(ca&&cb&&ca===cb)return true;
  var min=Math.min(na.length,nb.length),lenDiff=Math.abs(na.length-nb.length),diff=0;
  for(var i=0;i<min;i++){if(na[i]!==nb[i])diff++;}
  if(lenDiff===0&&diff<=1&&min>=4)return true;
  if(lenDiff===0&&min>=5&&na.slice(0,5)===nb.slice(0,5))return true;
  if(lenDiff===0&&diff<=2&&min>=7)return true;
  return false;
}
// ── EXTRACTION DES PRÉNOMS depuis une saisie ──
function extractPrenoms(s){
  // Gère : "Cathy et Lionel", "Paul & Marie", "sophie", "Cathy"
  var raw=String(s.parents||"").trim();
  var parts;
  if(s.nbParents>=2){
    parts=raw.split(/\s*[&\+]\s*|\s+et\s+/);
    if(parts.length===1)parts=[raw]; // fallback si pas de séparateur
  }else{
    // Même si nbParents=1, peut contenir "Cathy et Lionel"
    parts=raw.split(/\s+et\s+|\s*&\s*/);
  }
  return parts.map(function(p){return p.trim();}).filter(function(p){return p.length>0;});
}
// ── CALCUL DES FAMILLES ───────────────────────
// Une famille = même nom de famille (fratrie incluse)
// Les parents sont regroupés par prénom fuzzy
function computeFamilies(subs){
  var families={};
  subs.forEach(function(s){
    var fk=familyKey(s.eleve);
    if(!families[fk])families[fk]={key:fk,children:{},parents:[],totalH:0,byAct:{},subs:[]};
    var fam=families[fk];
    // Enregistrer l'enfant
    fam.children[s.eleve]=s.classe;
    fam.subs.push(s);
    // Extraire les prénoms
    var prenoms=extractPrenoms(s);
    var hpp=(parseFloat(s.heures)||0)/prenoms.length;
    prenoms.forEach(function(prenom){
      if(!prenom)return;
      // Chercher un parent existant avec prénom similaire
      var found=null;
      for(var i=0;i<fam.parents.length;i++){
        if(prenomMatch(prenom,fam.parents[i].prenoms[0])){found=fam.parents[i];break;}
      }
      if(!found){
        found={prenoms:[],totalH:0,byAct:{},byTri:{1:0,2:0,3:0,4:0},subs:[]};
        fam.parents.push(found);
      }
      // Ajouter variation de prénom si nouvelle
      var pnrm=nrm(prenom);
      var dejavu=found.prenoms.some(function(x){return nrm(x)===pnrm;});
      if(!dejavu)found.prenoms.push(prenom);
      // Cumuler heures
      found.totalH+=hpp;
      fam.totalH+=hpp;
      var at=s.activiteType||"Autre";
      found.byAct[at]=(found.byAct[at]||0)+hpp;
      fam.byAct[at]=(fam.byAct[at]||0)+hpp;
      var t=getTri(s.ts);
      if(t)found.byTri[t]+=hpp;
      found.subs.push(s);
    });
  });
  // Ajouter les heures-chèques après calcul des subs réelles
  Object.values(families).forEach(function(fam){
    fam.parents.forEach(function(par){
      var pname=displayPrenom(par.prenoms);
      var ch=chequesH(fam.key,pname);
      par.chequeH=ch;
      par.realH=par.totalH;
      if(ch>0){par.totalH+=ch;fam.totalH+=ch;}
    });
    fam.nbParentsObligation=fam.parents.length; // pour affichage objectif
  });
  return Object.values(families).sort(function(a,b){return a.key.localeCompare(b.key);});
}
// Affichage du prénom principal (le plus long = le plus complet)
function displayPrenom(prenoms){
  return prenoms.slice().sort(function(a,b){return b.length-a.length;})[0]||"";
}

function status(h){if(h>=OBJ)return"complete";var a=hAtt();if(a<=0||h>=a)return"ok";if(h>=a*.7)return"warn";return"late";}

  }).join("")+'</div>';
}
// -- INDEX COMPLET (toutes familles)
function buildFullFamilies(subs){
  var base=computeFamilies(subs||[]);
  var idx={};base.forEach(function(f){idx[f.key]=f;});
  Object.keys(ELEVES).forEach(function(cl){
    ELEVES[cl].forEach(function(e){
      var fk=familyKey(e);
      if(!idx[fk])idx[fk]={key:fk,children:{},parents:[],totalH:0,byAct:{},subs:[],ghost:true};
      var fam=idx[fk];
      var eNrm=nrm(e);
      var childExists=Object.keys(fam.children).some(function(k){return nrm(k)===eNrm;});
      if(!childExists)fam.children[e]=cl;
      (PARENTS_MAP[e]||[]).forEach(function(p){
        var already=fam.parents.some(function(par){
          return par.prenoms.some(function(pr){
            return nrm(pr)===nrm(p)||prenomMatch(pr,p);
          });
        });
        if(!already){
          var ch=chequesH(fk,p);
          fam.parents.push({prenoms:[p],totalH:ch,chequeH:ch,realH:0,byAct:{},byTri:{1:0,2:0,3:0,4:0},subs:[]});
          fam.totalH+=ch;
        }
      });
    });
  });
  return Object.values(idx).sort(function(a,b){return a.key.localeCompare(b.key);});
}

function portalResults(fam){
  var f=fam;

        '<div style="flex:1;min-width:0">'+

        '<div style="display:flex;gap:10px;font-size:10px;color:var(--mu)">'+

function rOverview(fs,tot){
  var nOk=fs.filter(function(f){return f.totalH>=OBJ_HEURES;}).length;
  function gauge(val,max,color){
    var p=Math.min(1,val/(max||1));
    var circ=125.66;var dash=rnd(circ*p);
    return'<svg viewBox="0 0 100 56" width="110" height="62" style="display:block;margin:4px auto">'+
      '<path d="M10 50 A40 40 0 0 1 90 50" fill="none" stroke="var(--bd)" stroke-width="8" stroke-linecap="round"/>'+
      '<path d="M10 50 A40 40 0 0 1 90 50" fill="none" stroke="'+color+'" stroke-width="8" stroke-linecap="round"'+
        ' stroke-dasharray="'+dash+' '+circ+'" style="transition:stroke-dasharray 1.2s .2s cubic-bezier(.4,0,.2,1)"/>'+
      '<text x="50" y="46" text-anchor="middle" font-size="13" font-weight="700" fill="'+color+'">'+Math.round(p*100)+'%</text>'+
    '</svg>';
  }
  var att=rnd(hAtt()),ct=curTri();
  // N utiliser buildFullFamilies que si subs sont charges
  var fsForStats=(S.subs!==null)?buildFullFamilies(S.subs):fs;
  var nLate=fsForStats.filter(function(f){var s=status(f.totalH);return s==="late"||f.totalH===0;}).length;
  var nOk=fsForStats.filter(function(f){var s=status(f.totalH);return s==="ok"||s==="complete";}).length;
  var stats=`<div class="srow"><div class="sc"><div class="sv">${fsForStats.length}</div><div class="slbl">Familles</div></div><div class="sc"><div class="sv">`+rnd(tot)+'h</div><div class="slbl">Total heures</div></div><div class="sc"><div class="sv" style="color:'+(nLate?"var(--red)":"var(--gn)")+`">${nLate}</div><div class="slbl">En retard</div></div></div>`;
  var info=`<div class="card mt12" style="font-size:13px;color:var(--mu);line-height:2"><p>Annee scolaire : <strong style="color:var(--tx)">${ANNEE}</strong></p><p>Trimestre en cours : <strong style="color:var(--tx)">T`+ct+(TRI[ct-1]?" - "+TRI[ct-1].m:"")+`</strong></p><p>Heures attendues a ce jour : <strong style="color:var(--tx)">${att}h / famille</strong></p><p>Familles a jour : <strong style="color:var(--gn)">`+nOk+`</strong></p><p>Familles en retard / sans heure : <strong style="color:var(--red)">${nLate}</strong></p></div>`;
  var lates=fsForStats.filter(function(f){var s=status(f.totalH);return s==="late"||f.totalH===0;})
    .sort(function(a,b){return a.totalH-b.totalH;});
  var lateH=lates.length?lates.slice(0,15).map(function(f){
    var nbPar=f.parents.length||1,famObj=nbPar*OBJ;
    var parentsDisp=f.parents.map(function(p){return displayPrenom(p.prenoms);}).join(", ");
    if(!parentsDisp){var pp=[];Object.keys(PARENTS_MAP).forEach(function(e){if(familyKey(e)===f.key)(PARENTS_MAP[e]||[]).forEach(function(p){if(pp.indexOf(p)===-1)pp.push(p);});});parentsDisp=pp.join(", ");}
    return`<div style="padding:10px 0;border-bottom:1px solid var(--bd)"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div style="font-size:13px;font-weight:600">Famille ${esc(f.key)}</div><div style="font-size:11px;color:var(--mu)">`+esc(parentsDisp)+'</div><div style="font-size:11px;color:var(--mu)">'+esc(Object.keys(f.children).join(", "))+'</div></div><div style="text-align:right"><div style="font-size:15px;font-weight:700;color:'+(f.totalH===0?"var(--mu)":"var(--red)")+'">'+
            (f.totalH===0?"0h":rnd(f.totalH)+"h")+
            `<span style="font-size:10px;color:var(--mu)"> /${famObj}h</span></div>`+
          (f.totalH===0?'<span style="font-size:10px;background:#F5F5F5;color:#999;padding:2px 6px;border-radius:8px">Aucune heure</span>':badge(status(f.totalH)))+
        '</div></div></div>';
  }).join(""):
    '<p class="empty" style="padding:14px">Toutes les familles sont a jour</p>';
  var lateCard=lates.length?
    `<div class="card mt12"><h3 style="font-size:14px;font-weight:700;margin-bottom:4px">Familles en retard / sans heure (${lates.length})</h3>`+
      lateH+
      (lates.length>15?'<p style="font-size:11px;color:var(--mu);text-align:center;margin-top:6px">+ '+(lates.length-15)+' autres</p>':"")+
    '</div>'  :"";
  var loadingNote=S.subs===null?'<div class="al aw mt8">Chargement...</div>'  :"";
  var heuresPot=Math.max(1,Math.max(fsForStats.length,1)*2*OBJ_HEURES);
  var gaugeHtml='<div style="display:flex;flex-wrap:wrap;gap:12px;margin-bottom:16px">'+
    '<div class="sc" style="flex:1;min-width:140px;padding:16px">'+
      '<div style="font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px">Avancement global</div>'+
      gauge(tot,heuresPot,'var(--red)')+
      '<div style="font-size:11px;color:var(--mu)">'+rnd(tot)+'h investies</div>'+
    '</div>'+
    '<div class="sc" style="flex:1;min-width:140px;padding:16px">'+
      '<div style="font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px">Objectif atteint</div>'+
      gauge(nOk,Math.max(fsForStats.length,1),'var(--gn)')+
      '<div style="font-size:11px;color:var(--mu)">'+nOk+' / '+fsForStats.length+' familles</div>'+
    '</div>'+
  '</div>';
  return gaugeHtml+stats+loadingNote+info+
    '<div class="mt16"><button class="btn bo" data-a="print-overview">Exporter PDF</button></div>'+
    lateCard;
}


function rHeures(fs){
  var elevesActuels=[];
  Object.keys(ELEVES).forEach(function(cl){elevesActuels=elevesActuels.concat(ELEVES[cl]);});
  var subsActuels=(S.subs||[]).filter(function(s){
    var eNrm=nrm(s.eleve);
    return elevesActuels.some(function(e){return nrm(e)===eNrm;});
  });
  var fsAll=buildFullFamilies(subsActuels);
  var OBJ=OBJ_HEURES;
  var dt=new Date().toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric"});
  var allParents=[];
  fsAll.forEach(function(f){f.parents.forEach(function(p){allParents.push(p);});});
  var nOk=allParents.filter(function(p){return p.totalH>=OBJ;}).length;
  var nZero=allParents.filter(function(p){return p.totalH===0;}).length;
  function slabel(h,ch){
    if(ch>0&&h===ch)return["Cheque(s)","#8B6000","#FFF8E1"];
    if(h>=OBJ)return["Objectif atteint","#2E7D4F","#E8F5EE"];
    if(h>=30)return["Bon avancement","#2E7D4F","#E8F5EE"];
    if(h>=20)return["En cours","#8B6000","#FFF8E1"];
    if(h>=10)return["A renforcer","#C0472A","#F5EAE7"];
    if(h>0)return["Insuffisant","#C0472A","#FDECEA"];
    return["Aucune heure","#999","#F5F5F5"];
  }
  var rows=fsAll.map(function(f){
    var enfants=Object.keys(f.children).join(" + ");
    var classes=Object.values(f.children).filter(function(v,i,a){return a.indexOf(v)===i;}).join(" / ");
    var famCheqTot=f.parents.reduce(function(a,par){return a+(par.chequeH||0);},0);
    var famBg=f.totalH===0?"var(--redl)":"var(--bg)";
    var allParsForFam=[];
    Object.keys(PARENTS_MAP).forEach(function(e){
      if(familyKey(e)===f.key)(PARENTS_MAP[e]||[]).forEach(function(p){
        if(p&&allParsForFam.indexOf(p)===-1)allParsForFam.push(p);
      });
    });
    var parRowsMap={};
    f.parents.forEach(function(par){
      var pname=displayPrenom(par.prenoms);
      parRowsMap[pname]={pname:pname,prenoms:par.prenoms,ph:par.totalH||0,ch:par.chequeH||0,byAct:par.byAct};
    });
    allParsForFam.forEach(function(p){
      var already=Object.keys(parRowsMap).some(function(k){return prenomMatch(k,p)||nrm(k)===nrm(p);});
      if(!already){
        var ch=chequesH(f.key,p);
        parRowsMap[p]={pname:p,prenoms:[p],ph:ch,ch:ch,byAct:{}};
      }
    });
    var parRows=Object.values(parRowsMap).map(function(par){
      var ph=par.ph,ch=par.ch,pname=par.pname;
      var lbl=slabel(ph,ch),pp=Math.min(100,Math.round(ph/OBJ*100));
      var cats=Object.keys(par.byAct).map(function(k){return esc(k)+": "+rnd(par.byAct[k])+"h";}).join(" - ");
      var chequeInfo=ch>0?'<span style="font-size:10px;background:var(--aml);color:var(--am);border-radius:8px;padding:1px 6px;margin-left:5px">cheque '+Math.round(ch/10)+'x (+'+rnd(ch)+'h)</span>':"";
      var noHours=ph===0?'<div style="font-size:11px;color:var(--mu);font-style:italic">Aucune heure déclarée</div>':"";
      return'<tr style="background:var(--sf);border-bottom:1px solid var(--bd)">'+
        '<td style="padding:7px 10px 7px 22px;font-size:12px;color:var(--tx);vertical-align:middle">'+
          '<span style="color:var(--mu);margin-right:4px">|-</span><strong>'+esc(pname)+'</strong>'+
          (par.prenoms.length>1?'<span style="font-size:10px;color:var(--mu);margin-left:6px">(aussi: '+esc(par.prenoms.filter(function(x){return x!==pname;}).join(", "))+')</span>':"")+
          chequeInfo+
          (cats?'<div style="font-size:11px;color:#888;margin-top:2px">'+cats+'</div>':"")+
          noHours+
        '</td>'+
        '<td style="padding:7px 10px;font-weight:700;font-size:14px;color:'+lbl[1]+';text-align:right;vertical-align:middle;white-space:nowrap">'+
          (ph===0?'<span style="color:#bbb">---</span>':rnd(ph)+'h')+
        '</td>'+
        '<td style="padding:7px 10px;vertical-align:middle;min-width:150px">'+
          '<div style="height:6px;background:#E0D9D3;border-radius:3px;overflow:hidden;margin-bottom:3px">'+
            '<div style="height:100%;width:'+pp+'%;background:'+lbl[1]+';border-radius:3px"></div>'+
          '</div>'+
          '<span style="font-size:10px;background:'+lbl[2]+';color:'+lbl[1]+';padding:2px 7px;border-radius:10px;font-weight:700">'+pp+'% - '+lbl[0]+'</span>'+
        '</td>'+
      '</tr>';
    }).join("");
    var rowBg2=f.totalH===0?'rgba(0,0,0,.02)':f.totalH>=OBJ_HEURES?'rgba(46,125,79,.08)':f.totalH<15?'rgba(192,71,42,.06)':'rgba(230,168,23,.05)';
    var rowBorder2=f.totalH===0?'var(--bd)':f.totalH>=OBJ_HEURES?'var(--gn)':f.totalH<15?'var(--red)':'#E6A817';
    return'<tr style="border-top:2px solid '+rowBorder2+';background:'+rowBg2+'">'+ 
      '<td colspan="3" style="padding:10px;background:'+famBg+'">'+
        '<span style="font-weight:700;font-size:14px">'+esc(enfants)+'</span>'+
        '<span style="font-size:11px;color:var(--mu);margin-left:8px">'+esc(classes)+'</span>'+
        '<span style="font-size:12px;color:var(--mu);margin-left:12px">Total famille : <strong style="color:'+(f.totalH>0?"var(--red)":"var(--hi)")+'">'+(f.totalH===0?"---":rnd(f.totalH)+"h")+'</strong></span>'+
        (famCheqTot>0&&f.subs&&f.subs.length===0?'<span style="font-size:11px;background:#FFF8E1;color:#8B6000;padding:1px 6px;border-radius:8px;margin-left:8px">cheques uniquement</span>':"")+
      '</td>'+
    '</tr>'+parRows;
  }).join("");
  var legendH='<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;font-size:11px">'+
    '<span style="font-weight:700;color:var(--mu);margin-right:4px">Objectif : 40h / parent ---</span>'+
    [[">=40h Objectif atteint","#2E7D4F","#E8F5EE"],[">=30h Bon avancement","#2E7D4F","#E8F5EE"],[">=20h En cours","#8B6000","#FFF8E1"],[">=10h A renforcer","#C0472A","#F5EAE7"],["<10h Insuffisant","#C0472A","#FDECEA"],["Cheque(s)","#8B6000","#FFF8E1"],["Aucune heure","#999","#F5F5F5"]].map(function(l){
      return'<span style="background:'+l[2]+';color:'+l[1]+';padding:2px 8px;border-radius:10px;font-weight:600">'+l[0]+'</span>';
    }).join("")+
  '</div>';
  var table='<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:13px">'+
    '<thead><tr style="background:var(--bg)">'+
      '<th style="padding:9px 10px;text-align:left;font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:.04em;border-bottom:2px solid var(--bd)">Enfant(s) / Parent</th>'+
      '<th style="padding:9px 10px;text-align:right;font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:.04em;border-bottom:2px solid var(--bd)">Heures</th>'+
      '<th style="padding:9px 10px;text-align:left;font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:.04em;border-bottom:2px solid var(--bd)">Progression / 40h</th>'+
    '</tr></thead><tbody>'+rows+'</tbody></table></div>';
  var statsH='<div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:20px">'+
    [["Familles",fsAll.length,"var(--red)"],["Parents recenses",allParents.length,"var(--red)"],["Objectif atteint",nOk+" parents","var(--gn)"],["Sans heures",nZero+" parents","var(--mu)"]].map(function(s){
      return'<div class="sc"><div class="sv" style="font-size:18px;color:'+s[2]+'">'+s[1]+'</div><div class="slbl">'+s[0]+'</div></div>';
    }).join("")+'</div>';
  return'<div id="rapport-content">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">'+
      '<div><h2 style="font-size:17px;font-weight:700">Rapport d\'investissement</h2>'+
      '<p style="font-size:12px;color:var(--mu)">Edition du '+dt+' - '+ANNEE+' - Objectif : 40h / parent</p></div>'+
      '<button class="btn bp bsm" onclick="printRapport()">Imprimer / PDF</button>'+
    '</div>'+statsH+legendH+table+
    '<p style="font-size:11px;color:var(--mu);margin-top:10px;text-align:right">Clardeluna '+ANNEE+' - '+dt+'</p>'+
  '</div>';
}

function rSaisies(subs){
  var q=nrm(S.aSubQ||"");
  var step1=subs.filter(function(s){
    return !q||nrm(s.eleve+" "+s.parents+" "+s.sousActivite+" "+s.activiteType).includes(q);
  });
  // ── Filtre par famille ──
  var famKeys=[];var famSet={};
  step1.forEach(function(s){var fk=familyKey(s.eleve);if(!famSet[fk]){famSet[fk]=true;famKeys.push(fk);}});
  famKeys.sort();
  var selFam=S.saisiesFam||"all";
  var step2=selFam==="all"?step1:step1.filter(function(s){return familyKey(s.eleve)===selFam;});
  // ── Suggestions parents (basées sur step2) ──
  var pSet={};
  step2.forEach(function(s){

    }).join('');
    totActH='<div style="background:var(--bg);border:1px solid var(--bd);border-radius:var(--rs);margin-bottom:12px;overflow:hidden">'+
      '<div data-a="tog-acts-table" style="display:flex;justify-content:space-between;align-items:center;padding:10px;cursor:pointer">'+
        '<div><span style="font-size:12px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.04em">Total par activite</span>'+
        '<span style="font-size:13px;font-weight:700;color:var(--red);margin-left:10px">'+rnd(totalH)+'h</span>'+
        '<span style="font-size:11px;color:var(--mu);margin-left:6px">('+Object.keys(actTotals).length+' activites)</span></div>'+
        '<span style="font-size:14px;color:var(--mu)">'+(isOpen?'&#9650;':'&#9660;')+'</span>'+
      '</div>'+
      (isOpen?'<div style="padding:0 10px 10px">'+actRows+'</div>':'')+
    '</div>';
  }
  // ── Compact filter bar ──
  var famOpts='<option value="all">👨‍👩‍👧 Toutes familles</option>'+famKeys.map(function(fk){
    return'<option value="'+esc(fk)+'"'+(selFam===fk?' selected':'')+'>'+esc(fk)+'</option>';
  }).join('');
  var parOpts='<option value="all">👤 Tous parents</option>'+parentSugg.map(function(p){
    return'<option value="'+esc(p)+'"'+(selPar===p?' selected':'')+'>'+esc(p)+'</option>';
  }).join('');
  var listH=filtered.length?filtered.map(function(s){
    var d=new Date(s.ts),t=getTri(s.ts);
    // Inline edit form
    if(S.editSaisieId===s.id){

      var pButtons=pOpts.length?
        '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px">'+
          pOpts.map(function(p){
            return'<button class="fc2'+(s.parents===p?' on':'')+'" data-a="edit-saisie-par" data-id="'+esc(s.id)+'" data-p="'+esc(p)+'">'+esc(p)+'</button>';
          }).join('')+
        '</div>':
        '<input class="inp" id="edit-par-inp" value="'+esc(s.parents)+'" style="font-size:13px;padding:7px 10px;margin-top:6px">';
      return'<div class="si" style="background:var(--aml);border:1px solid var(--am)">'+
        '<div style="font-size:12px;font-weight:700;color:var(--am);margin-bottom:6px">Modifier la saisie</div>'+
        '<div style="font-size:13px;font-weight:700">'+esc(s.eleve)+' - '+esc(s.classe)+'</div>'+
        '<div style="font-size:12px;color:var(--mu);margin-bottom:4px">'+esc(s.activiteType)+' -> '+esc(s.sousActivite)+'</div>'+
        '<div style="font-size:11px;font-weight:700;color:var(--mu);margin-top:8px;text-transform:uppercase;letter-spacing:.04em">Parent</div>'+
        pButtons+
        '<div style="font-size:11px;font-weight:700;color:var(--mu);margin-top:8px;text-transform:uppercase;letter-spacing:.04em">Heures</div>'+
        '<div class="chips" style="margin-top:4px">'+[0.5,1,1.5,2,3,4,5,6,7,8,9,10,12,15,20,22,25,30].map(function(n){
          return'<div class="chip'+(String(n)===String(s.heures)?' on':'')+'" data-a="edit-saisie-h" data-id="'+esc(s.id)+'" data-v="'+n+'">'+n+'h</div>';

    return'<div class="si" style="'+(S.deleting===s.id?"opacity:.4":"")+'" >'+
      '<div style="display:flex;justify-content:space-between;align-items:flex-start">'+

        '</div>'+

          '<button style="font-size:11px;color:var(--red);background:none;border:none;cursor:pointer;font-family:inherit" data-a="del" data-id="'+esc(s.id)+'">'+(S.deleting===s.id?"...":"Supprimer")+'</button>'+

  return'<div class="fbar-compact">'+
    '<input class="fbar-search" id="sq" placeholder="Rechercher..." value="'+esc(S.aSubQ||"")+'" autocomplete="off">'+
    (famKeys.length>1?'<select class="fbar-sel'+(selFam!="all"?" active":"")+'" data-a="sel-fam">'+famOpts+'</select>':'')+
    (parentSugg.length>1?'<select class="fbar-sel'+(selPar!="all"?" active":"")+'" data-a="sel-par">'+parOpts+'</select>':'')+
    '<button class="btn bp bsm" data-a="print-saisies" style="flex-shrink:0;white-space:nowrap">PDF</button>'+
    '</div>'+
    '<p style="font-size:12px;color:var(--mu);margin-bottom:10px">'+filtered.length+' saisie'+(filtered.length>1?"s":"")+" / "+subs.length+' total - '+rnd(totalH)+'h</p>'+
    totActH+
    '<div id="saisies-list">'+listH+'</div>';
}

function rRapport(fs,tot){
  // ── Agrégation des heures par catégorie et sous-activité ──
  var subs=(S.subs||[]).filter(function(s){
    var h=parseFloat(s.heures);
    if(isNaN(h)||h<=0)return false;
    if(!s.activiteType||!s.activiteType.trim())return false;
    // Exclure l'activité "Bureau" dans Admin / CA (hors Bureau)
    if((s.sousActivite||"").trim()==="Bureau")return false;
    return true;
  });

  // totaux par catégorie > sous-activité
  // Correction automatique : si la sous-activité appartient à une autre catégorie dans ACTS,
  // on utilise la bonne catégorie (ex. "Cap d'An" mal classé en Admin → Festivités)
  var byCateg={}; // { "Commissions": { "Travaux": 12, ... }, ... }
  subs.forEach(function(s){
    var sous=(s.sousActivite||"").trim()||"(non précisé)";
    var h=parseFloat(s.heures)||0;
    // Déterminer la vraie catégorie via ACTS
    var cat=s.activiteType.trim();
    Object.keys(ACTS).forEach(function(actCat){
      if(ACTS[actCat].indexOf(sous)!==-1)cat=actCat;
    });
    // Normaliser "Administratif / CA" (nom court dans ACTS) → nom complet CAT_ADM
    if(cat==="Administratif / CA")cat=CAT_ADM;
    if(!byCateg[cat])byCateg[cat]={};
    byCateg[cat][sous]=(byCateg[cat][sous]||0)+h;
  });

  var ORDER=["Commissions","Festivités",CAT_ADM];
  var COLORS_COM=[
    "#C0472A","#E8714F","#F4A07A","#F7C4A6","#FAE0D0",
    "#8B2A18","#D45D3A","#E89060","#F2B68A","#F8D4B8",
    "#6B1E10","#C04830","#DB7550","#ECA070","#F5C8A0",
    "#9B3520","#CC5C42","#E07A5C","#ECA584","#F5CEAE",
    "#751508","#B03C28","#CD6448","#E09070","#EFC09A"
  ];
  var COLORS_FES=[
    "#2E7D4F","#4CAF77","#7FCC9F","#AADDB8","#D0EDDA",
    "#1A5C3A","#3A9C65","#6BBF90","#9FD5B0","#C8E8D5",
    "#0F4028","#2E8055","#5AB07D","#8FCCA5","#BCE3CA",
    "#1F6B42","#3A9668","#67BA8C","#96D1AE","#C2E5CF",
    "#254D35","#3D8A5D","#6AB585","#98CCA8","#C5E2D2"
  ];

  // ── Calcul total des chèques ──
  var totalCheques=0;
  var chequeRows="";
  // Parcourir toutes les familles pour agréger les chèques par parent
  var fsAll2=buildFullFamilies(S.subs||[]);
  var chequeByPar={}; // { "Famille NOM - Prénom": nbH }
  fsAll2.forEach(function(f){
    f.parents.forEach(function(par){
      var pname=displayPrenom(par.prenoms);
      var ch=par.chequeH||0;
      if(ch>0){
        var label=f.key+' — '+pname;
        chequeByPar[label]=(chequeByPar[label]||0)+ch;
        totalCheques+=ch;
      }
    });
  });

  // ── Pré-calcul du grand total (avant la boucle d'affichage) ──
  var categTotals={};
  var grandTotal=0;
  ORDER.forEach(function(cat){
    if(!byCateg[cat])return;
    var t=Object.values(byCateg[cat]).reduce(function(a,v){return a+v;},0);
    if(t>0){categTotals[cat]=t;grandTotal+=t;}
  });
  grandTotal+=totalCheques; // inclure les chèques dans le total de référence

  // ── Tableau principal ──
  var tableRows="";

  ORDER.forEach(function(cat){
    if(!byCateg[cat])return;
    var subMap=byCateg[cat];
    var catTotal=categTotals[cat]||0;
    if(catTotal===0)return;

    // En-tête catégorie
    var catColor=cat===CAT_COM?"#C0472A":cat===CAT_FES?"#2E7D4F":"#8B6000";
    var catPct=Math.round(catTotal/(grandTotal||1)*100);
    tableRows+=`<tr style="background:${catColor};color:#fff"><td colspan="2" style="padding:8px 12px;font-weight:700;font-size:13px;letter-spacing:0.03em">`+cat+
        `<span style="font-size:11px;font-weight:400;opacity:0.8;margin-left:10px">${catPct}% du total</span></td><td style="padding:8px 12px;font-weight:700;text-align:right;white-space:nowrap">`+rnd(catTotal)+' h</td></tr>';

    // Lignes sous-activité
    Object.keys(subMap).sort().forEach(function(sous){
      var h=subMap[sous];
      if(h<=0)return;
      var pct=Math.round(h/catTotal*100);
      tableRows+=`<tr style="border-bottom:1px solid #EEE"><td style="padding:6px 12px 6px 24px;font-size:12px;color:#555;width:16px;vertical-align:middle">↳</td><td style="padding:6px 4px 6px 0;font-size:12px;color:var(--tx);vertical-align:middle">${sous}</td><td style="padding:6px 12px;text-align:right;white-space:nowrap;font-size:12px;font-weight:600;vertical-align:middle"><span style="color:var(--mu);font-size:11px;margin-right:6px">`+pct+`%</span>${rnd(h)} h</td></tr>`;
    });
  });

  // ── Section Chèques ──
  if(totalCheques>0){
    var cheqPct=Math.round(totalCheques/(grandTotal||1)*100);
    tableRows+=`<tr style="background:#5B4A9B;color:#fff"><td colspan="2" style="padding:8px 12px;font-weight:700;font-size:13px;letter-spacing:0.03em">🎫 Ch&egrave;ques encaiss&eacute;s pour non investissement = 40 heures<span style="font-size:11px;font-weight:400;opacity:0.8;margin-left:10px">${cheqPct}% du total</span></td><td style="padding:8px 12px;font-weight:700;text-align:right;white-space:nowrap">`+rnd(totalCheques)+' h</td></tr>';
    var nbCheqParents=Object.keys(chequeByPar).length;
    Object.keys(chequeByPar).sort().forEach(function(label){
      var h=chequeByPar[label];
      var nb=Math.round(h/H_CHEQUE);
      var pct=Math.round(h/totalCheques*100);
      tableRows+=`<tr style="border-bottom:1px solid #EEE"><td style="padding:6px 12px 6px 24px;font-size:12px;color:#555;width:16px;vertical-align:middle">↳</td><td style="padding:6px 4px 6px 0;font-size:12px;color:var(--tx);vertical-align:middle">${esc(label)}<span style="font-size:10px;background:#EDE8FB;color:#5B4A9B;border-radius:8px;padding:1px 6px;margin-left:6px">`+nb+' chèque'+(nb>1?'s':'')+`</span></td><td style="padding:6px 12px;text-align:right;white-space:nowrap;font-size:12px;font-weight:600;vertical-align:middle"><span style="color:var(--mu);font-size:11px;margin-right:6px">${pct}%</span>`+rnd(h)+' h</td></tr>';
    });
  }

  // Ligne de total général
  tableRows+=`<tr style="border-top:3px solid #1C1814;background:#1C1814;color:#fff"><td colspan="2" style="padding:10px 12px;font-weight:700;font-size:14px;letter-spacing:0.04em">TOTAL GÉNÉRAL (toutes catégories + chèques)</td><td style="padding:10px 12px;font-weight:700;font-size:16px;text-align:right;white-space:nowrap">${rnd(grandTotal)} h</td></tr>`;

  var table=`<div style="overflow-x:auto;margin-bottom:28px"><table style="width:100%;border-collapse:collapse;font-size:13px;border:1px solid var(--bd)"><thead><tr style="background:#F7F4F1"><th colspan="2" style="padding:9px 12px;text-align:left;font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:.04em;border-bottom:2px solid var(--red)">Activité</th><th style="padding:9px 12px;text-align:right;font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:.04em;border-bottom:2px solid var(--red)">Heures</th></tr></thead><tbody>${tableRows}</tbody></table></div>`;

  // ── Camemberts SVG ──
  function makePie(title,dataMap,colors){
    var items=Object.keys(dataMap).filter(function(k){return dataMap[k]>0;}).sort(function(a,b){return dataMap[b]-dataMap[a];});
    if(!items.length)return'<div style="text-align:center;color:var(--mu);padding:20px">Aucune donnée</div>';
    var total=items.reduce(function(a,k){return a+dataMap[k];},0);
    // SVG pie
    var cx=110,cy=110,r=90;
    var angle=-Math.PI/2; // start top
    var slices="";
    items.forEach(function(k,i){
      var v=dataMap[k]/total;
      var a1=angle,a2=angle+v*2*Math.PI;
      var x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1);
      var x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
      var large=v>0.5?1:0;
      var col=colors[i%colors.length];
      // tooltip via title element
      var pct=Math.round(v*100);
      slices+=`<path d="M${cx},`+cy+' L'+x1+','+y1+' A'+r+','+r+' 0 '+large+',1 '+x2+','+y2+' Z" fill="'+col+`" stroke="#fff" stroke-width="1.5"><title>${k} : `+rnd(dataMap[k])+`h (${pct}%)</title></path>`;
      // mid angle for small label (only if >=5%)
      if(v>=0.05){
        var mid=a1+v*Math.PI;
        var lx=cx+(r*0.65)*Math.cos(mid),ly=cy+(r*0.65)*Math.sin(mid);
        slices+=`<text x="${lx}" y="`+ly+`" text-anchor="middle" dominant-baseline="middle" fill="#fff" font-size="9" font-weight="700">${pct}%</text>`;
      }
      angle=a2;
    });
    // Légende
    var legend=items.map(function(k,i){
      var pct=Math.round(dataMap[k]/total*100);
      return'<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:11px"><div style="width:10px;height:10px;border-radius:2px;flex-shrink:0;background:'+colors[i%colors.length]+`"></div><span style="color:var(--tx);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${k}">`+k+`</span><span style="color:var(--mu);white-space:nowrap;font-weight:600">${rnd(dataMap[k])}h (`+pct+'%)</span></div>';
    }).join('');
    return`<div style="background:var(--sf);border-radius:10px;border:1px solid var(--bd);padding:16px;margin-bottom:20px"><h3 style="font-size:13px;font-weight:700;margin-bottom:12px;color:var(--tx)">${title}</h3><div style="display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap"><svg viewBox="0 0 220 220" width="180" height="180" style="flex-shrink:0">`+slices+`</svg><div style="flex:1;min-width:180px;max-height:220px;overflow-y:auto">${legend}</div></div></div>`;
  }

  var pieCommissions = (byCateg[CAT_COM])?makePie("Répartition des heures — Commissions",byCateg[CAT_COM],COLORS_COM):'<p style="color:#999;font-style:italic">Aucune donnée Commissions</p>';
  var pieFestivites  = (byCateg[CAT_FES])  ?makePie("Répartition des heures — Festivités",byCateg[CAT_FES],COLORS_FES):'<p style="color:#999;font-style:italic">Aucune donnée Festivités</p>';

  // ── Stats résumé ──
  // ── Graphique synthèse potentiel/réalisé/chèques ──
  // Compter le nombre total de parents (adhérents)
  var fsAll3=buildFullFamilies(S.subs||[]);
  var totalParents=0;
  fsAll3.forEach(function(f){
    // Compter les parents avec au moins une heure OU un chèque OU dans PARENTS_MAP
    var pSet=[];
    Object.keys(PARENTS_MAP).forEach(function(e){
      if(familyKey(e)===f.key)(PARENTS_MAP[e]||[]).forEach(function(p){
        if(p&&pSet.indexOf(p)===-1)pSet.push(p);
      });
    });
    f.parents.forEach(function(par){
      var pname=displayPrenom(par.prenoms);
      var alreadyIn=pSet.some(function(p){return prenomMatch(p,pname)||nrm(p)===nrm(pname);});
      if(!alreadyIn)pSet.push(pname);
    });
    totalParents+=Math.max(1,pSet.length);
  });
  var heuresPotentielles=totalParents*OBJ;
  var heuresEffectuees=grandTotal-totalCheques; // heures réelles sans chèques
  var heuresReste=Math.max(0,heuresPotentielles-grandTotal); // ni faites ni chèques

  // SVG barchart horizontal
  var bw=460,bh=170,ml=180,mr=80,barH=32,gap=14;
  var maxVal=heuresPotentielles||1;
  var bars=[
    {label:"Potentiel ("+totalParents+" parents × 40h)",val:heuresPotentielles,color:"#8A8278",textColor:"#fff"},
    {label:"Heures effectuées",val:heuresEffectuees,color:"#2E7D4F",textColor:"#fff"},
    {label:"Chèques encaissés",val:totalCheques,color:"#5B4A9B",textColor:"#fff"},
    {label:"Reste non comblé",val:heuresReste,color:"#F4A07A",textColor:"#fff"}
  ];
  var svgH=bars.length*(barH+gap)+40;
  var svgBars=bars.map(function(b,i){
    var y=30+i*(barH+gap);
    var w=Math.max(2,Math.round((b.val/maxVal)*(bw-ml-mr)));
    var inside=w>50;
    return`<text x="${ml}" y="`+(y+barH/2+1)+`" dominant-baseline="middle" text-anchor="end" font-size="11" fill="#1C1814" font-family="inherit">${b.label}</text><rect x="`+ml+'" y="'+y+'" width="'+w+'" height="'+barH+'" rx="4" fill="'+b.color+'"/>'+
      (inside
        ?'<text x="'+(ml+w-6)+'" y="'+(y+barH/2+1)+`" dominant-baseline="middle" text-anchor="end" font-size="11" font-weight="700" fill="${b.textColor}" font-family="inherit">`+rnd(b.val)+'h</text>'
        :'<text x="'+(ml+w+6)+'" y="'+(y+barH/2+1)+`" dominant-baseline="middle" text-anchor="start" font-size="11" font-weight="700" fill="#1C1814" font-family="inherit">${rnd(b.val)}h</text>`
      );
  }).join('');

function printHeures(){
  var fsAll=(S.subs!==null)?buildFullFamilies(S.subs):computeFamilies(S.subs||[]);
  var hq=nrm(S.aHeureQ||"");
  var filtered=fsAll.filter(function(f){
    var clsOk=S.aCls==="all"||Object.values(f.children).indexOf(S.aCls)!==-1;
    var stOk;
    if(S.aFilter==="all")stOk=true;
    else if(S.aFilter==="zero")stOk=f.totalH===0;
    else stOk=f.totalH>0&&status(f.totalH)===S.aFilter;
    var qOk=!hq||nrm(f.key).includes(hq)||Object.keys(f.children).some(function(ch){return nrm(ch).includes(hq);});
    return clsOk&&stOk&&qOk;
  }).sort(function(a,b){return a.key.localeCompare(b.key);});
  var dt=new Date().toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric"});
  var clsLabel=S.aCls==="all"?"Toutes classes":S.aCls;
  var stLabels={all:"Tous","ok":"A jour",warn:"Vigilance",late:"En retard",zero:"Aucune heure",complete:"Objectif atteint"};
  var stLabel=stLabels[S.aFilter]||"Tous";
  var rows=filtered.map(function(f){
    var s=f.totalH===0?"zero":status(f.totalH);
    var nbPar=f.parents.length||1,famObj=nbPar*OBJ;
    var p=Math.min(100,Math.round(f.totalH/famObj*100));
    var color=s==="complete"||s==="ok"?"#2E7D4F":s==="warn"?"#8B6000":s==="zero"?"#999":"#C0472A";
    var dispPars=[];
    Object.keys(PARENTS_MAP).forEach(function(e){
      if(familyKey(e)===f.key)(PARENTS_MAP[e]||[]).forEach(function(p2){if(dispPars.indexOf(p2)===-1)dispPars.push(p2);});
    });
    if(!dispPars.length)dispPars=f.parents.map(function(par){return displayPrenom(par.prenoms);});
    var stLabel2=s==="zero"?"Aucune heure":s==="complete"?"Objectif atteint":s==="ok"?"A jour":s==="warn"?"Vigilance":"En retard";
    return`<tr><td style="padding:8px 10px;border-bottom:1px solid #E0D9D3;font-size:12px"><strong>Famille ${esc(f.key)}</strong><div style="color:#888">`+esc(dispPars.join(", "))+'</div><div style="color:#888">'+esc(Object.keys(f.children).join(", "))+`</div></td><td style="padding:8px 10px;border-bottom:1px solid #E0D9D3;text-align:right;font-weight:700;color:${color}">`+
        (f.totalH===0?"0h":rnd(f.totalH)+"h")+
        `<div style="font-size:10px;color:#999">/ ${famObj}h</div></td><td style="padding:8px 10px;border-bottom:1px solid #E0D9D3"><div style="height:5px;background:#E0D9D3;border-radius:3px;margin-bottom:3px"><div style="height:100%;width:`+p+`%;background:${color};border-radius:3px"></div></div><span style="font-size:10px;background:#F5F5F5;color:`+color+`;padding:1px 6px;border-radius:8px;font-weight:700">${p}% - `+stLabel2+'</span></td></tr>';
  }).join("");
  var totalH=filtered.reduce(function(a,f){return a+f.totalH;},0);
  var html=
    `<h1 style="font-size:16px;font-weight:700;color:#C0472A;margin-bottom:4px">Clardeluna - Heures par famille</h1><div style="font-size:11px;color:#666;margin-bottom:12px">${dt} - `+ANNEE+' - '+clsLabel+' - Filtre : '+stLabel+`</div><table style="width:100%;border-collapse:collapse"><thead><tr><th style="padding:7px 10px;text-align:left;font-size:11px;color:#888;text-transform:uppercase;border-bottom:2px solid #E0D9D3;background:#F7F4F1">Famille</th><th style="padding:7px 10px;text-align:right;font-size:11px;color:#888;text-transform:uppercase;border-bottom:2px solid #E0D9D3;background:#F7F4F1">Heures</th><th style="padding:7px 10px;text-align:left;font-size:11px;color:#888;text-transform:uppercase;border-bottom:2px solid #E0D9D3;background:#F7F4F1">Progression</th></tr></thead><tbody>${rows}</tbody></table><p style="font-size:11px;color:#aaa;margin-top:8px">`+filtered.length+` familles - Total filtre : ${rnd(totalH)}h</p>`;
  var overlay=document.getElementById("print-overlay");
  if(overlay){overlay.innerHTML=html;window.print();setTimeout(function(){overlay.innerHTML="";},2000);}
}

function rAnnuaire(){
  var q=nrm(S.annuaireQ||"");
  var cls=Object.keys(ELEVES);
  var clsFilter=S.annuaireClsFilter||"all";
  var families={};
  cls.forEach(function(cl){
    ELEVES[cl].forEach(function(e){
      var fk=familyKey(e);
      if(!families[fk])families[fk]={key:fk,parents:[],classes:[]};
      var fam=families[fk];
      if(fam.classes.indexOf(cl)===-1)fam.classes.push(cl);
      (PARENTS_MAP[e]||[]).forEach(function(p){
        var already=fam.parents.some(function(par){return nrm(par.prenom)===nrm(p)||prenomMatch(par.prenom,p);});
        if(!already)fam.parents.push({prenom:p});
      });
    });
  });
  var allFams=Object.values(families).sort(function(a,b){return a.key.localeCompare(b.key);});
  var filtered=allFams.filter(function(fam){
    var clsOk=clsFilter==="all"||fam.classes.indexOf(clsFilter)!==-1;
    var qOk=!q||nrm(fam.key).includes(q)||fam.parents.some(function(par){return nrm(par.prenom).includes(q);});
    return clsOk&&qOk;
  });
  var total=0,filled=0;
  allFams.forEach(function(fam){
    fam.parents.forEach(function(par){
      total++;
      var info=ANNUAIRE_MAP[chequeKey(fam.key,par.prenom)]||{};
      if(info.email||info.tel)filled++;
    });
  });
  var clsFilterBtns='<div class="fbar" style="margin-bottom:12px">'+
    '<button class="fc2'+(clsFilter==="all"?" on":"")+'" data-a="ann-cls" data-v="all">Toutes</button>'+
    cls.map(function(cl){
      return'<button class="fc2'+(clsFilter===cl?" on":"")+'" data-a="ann-cls" data-v="'+esc(cl)+'">'+esc(cl)+'</button>';
    }).join("")+
  '</div>';
  var famCards=filtered.length?filtered.map(function(fam){
    var parRows=fam.parents.map(function(par){
      var ak=chequeKey(fam.key,par.prenom);
      var info=ANNUAIRE_MAP[ak]||{};
      var hasData=info.email||info.tel;
      return'<div style="padding:8px 0;border-bottom:1px solid var(--bd)">'+
        '<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">'+
          '<span style="font-size:13px;font-weight:600">'+esc(par.prenom)+'</span>'+
          (hasData?'<span style="font-size:10px;background:var(--gnl);color:var(--gn);padding:1px 6px;border-radius:10px">✓</span>':'<span style="font-size:10px;background:var(--bg);color:var(--hi);padding:1px 6px;border-radius:10px">à renseigner</span>')+
        '</div>'+
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'+
          '<div>'+
            '<label class="lbl" style="font-size:10px">Email</label>'+
            '<input class="inp ann-field" data-ak="'+esc(ak)+'" data-field="email" type="email" placeholder="email@..." value="'+esc(info.email||'')+'" style="font-size:12px;padding:7px 10px" autocomplete="off">'+
          '</div>'+
          '<div>'+
            '<label class="lbl" style="font-size:10px">Téléphone</label>'+
            '<input class="inp ann-field" data-ak="'+esc(ak)+'" data-field="tel" type="tel" placeholder="06 XX XX XX XX" value="'+esc(info.tel||'')+'" style="font-size:12px;padding:7px 10px" autocomplete="off">'+
          '</div>'+
        '</div>'+
      '</div>';
    }).join('');
    var enfants=[];
    cls.forEach(function(cl){ELEVES[cl].forEach(function(e){if(familyKey(e)===fam.key)enfants.push(e+' ('+cl+')');});});
    return'<div class="card" style="margin-bottom:8px">'+
      '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">'+
        '<div>'+
          '<div style="font-size:15px;font-weight:700">Famille '+esc(fam.key)+'</div>'+
          '<div style="font-size:11px;color:var(--mu)">'+esc(enfants.join(' · '))+'</div>'+
        '</div>'+
        '<div style="font-size:11px;color:var(--mu)">'+fam.parents.length+' parent'+(fam.parents.length>1?'s':'')+'</div>'+
      '</div>'+
      parRows+
    '</div>';
  }).join(''):'<p class="empty">Aucune famille trouvée</p>';
  return'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">'+
    '<h2 style="font-size:17px;font-weight:700">📋 Annuaire</h2>'+

  '<p style="font-size:13px;color:var(--mu);margin-bottom:12px">'+filled+' / '+total+' contacts renseignés · Sauvegarde auto à la saisie</p>'+

        (acts.length?actRows:'<p style="font-size:12px;color:var(--mu);padding:8px 0">Aucune activite.</p>')+
        '<div style="background:var(--bg);border-radius:var(--rs);padding:10px;margin-top:10px">'+
          '<div style="font-size:12px;font-weight:700;margin-bottom:6px;color:var(--mu)">+ Ajouter une activite</div>'+

          '<button class="btn bp bsm" data-a="save-acts">Enregistrer ('+acts.length+')</button>'+

          '<button style="background:none;border:1px solid var(--red);border-radius:var(--r);color:var(--red);font-size:12px;padding:6px 12px;cursor:pointer;font-family:inherit;font-weight:600" data-a="del-cat" data-cat="'+esc(cat)+'">Supprimer la categorie</button>'+
        '</div>'+
      '</div>';
    }
    return'<div class="card" style="margin-bottom:8px">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;cursor:pointer" data-a="toggle-cat" data-cat="'+esc(cat)+'">'+
        '<div><span style="font-size:15px;font-weight:700">'+esc(cat)+'</span>'+
        '<span style="font-size:12px;color:var(--mu);margin-left:8px">'+acts.length+' activite'+(acts.length>1?'s':'')+'</span></div>'+
        '<span style="font-size:16px;color:var(--mu)">'+(isOpen?'&#9650;':'&#9660;')+'</span>'+
      '</div>'+inner+'</div>';
  }).join('');
  return'<h2 style="font-size:17px;font-weight:700;margin-bottom:4px">Gestion des activites</h2>'+
    '<p style="font-size:13px;color:var(--mu);margin-bottom:14px">Gerez les categories et activites du formulaire.</p>'+
    saved+saving+catSecs+newCatSec;
}

function bindAll(){
  document.removeEventListener("click",onClick);
  document.addEventListener("click",onClick);
  // Touche Entrée sur l'écran d'accès parents
  var ai=document.getElementById("ai");
  if(ai){
    ai.oninput=function(){sil({accessInput:ai.value,accessErr:false});};
    ai.addEventListener("keydown",function(e){
      if(e.key==="Enter"){
        var v=ai.value.trim();
        sha256hex(v).then(function(h){
          if(h===ACCESS_HASH){
            try{sessionStorage.setItem("cl_unlocked","1");}catch(err){}
            go({page:"home",accessErr:false,accessInput:""});
          }else{
            go({accessErr:true,accessInput:v});
          }
        });
      }
    });
  }
  var pi=document.getElementById("pi");
  if(pi)pi.addEventListener("keydown",function(e){if(e.key==="Enter")checkPin();});
  // Validation dynamique step 2
  var bn2=document.getElementById("bn2");
  if(bn2){
    function chk2(){
      var i1=document.getElementById("ip1"),i2=document.getElementById("ip2");
      bn2.disabled=!((i1&&i1.value.trim().length>1)&&(S.form.nbParents===1||(i2&&i2.value.trim().length>1)));
    }
    var i1=document.getElementById("ip1"),i2=document.getElementById("ip2");
    if(i1)i1.addEventListener("input",chk2);
    if(i2)i2.addEventListener("input",chk2);
  }
  // Validation dynamique step 4
  var bn4=document.getElementById("bn4"),ih=document.getElementById("ih");
  if(bn4&&ih)ih.addEventListener("input",function(){bn4.disabled=isNaN(parseFloat(ih.value))||parseFloat(ih.value)<=0;});
  // Recherche portail — live avec debounce
  var pq=document.getElementById("pq");
  if(pq){
    var _pqTimer=null;
    pq.oninput=function(){
      sil({portalQ:pq.value});
      clearTimeout(_pqTimer);
      _pqTimer=setTimeout(function(){
        if(S.subs!==null){
          var res=document.getElementById("portal-results");
          if(res){res.innerHTML=portalResults();reattach();}
        }
      },200);
    };
    pq.addEventListener("keydown",function(e){
      if(e.key==="Enter"){clearTimeout(_pqTimer);doSearch();}
    });
  }
  // Recherche élève
  var eq=document.getElementById("eq");
  if(eq){
    eq.addEventListener("change",function(){
      var v=eq.value;
      if(v)go(function(s){return{step:2,form:Object.assign({},s.form,{eleve:v,p1:'',p2:'',nbParents:1})};});
    });
  }
  var sq=document.getElementById("sq");
  if(sq){
    sq.oninput=function(){
      var pos=sq.selectionStart;
      sil({aSubQ:sq.value});
      go({});
      var newSq=document.getElementById("sq");
      if(newSq){newSq.focus();newSq.setSelectionRange(pos,pos);}
    };
  }
  // Recherche Heures — live sans perte de focus
  var hq2=document.getElementById("heure-q");
  if(hq2)hq2.oninput=function(){
    var pos=hq2.selectionStart;
    sil({aHeureQ:hq2.value});go({});
    var nhq=document.getElementById("heure-q");
    if(nhq){nhq.focus();nhq.setSelectionRange(pos,pos);}
  };
  // Saisie manuelle — champ heures libre
  var manHInp=document.getElementById('man-h-inp');
  if(manHInp)manHInp.addEventListener('input',function(){
    sil({manHeures:manHInp.value});
    var btn=document.querySelector('[data-a="man-submit"]');
    if(btn)btn.disabled=!(S.manEleve&&S.manParent&&S.manTypeAct&&S.manSousAct&&parseFloat(manHInp.value)>0);
  });
}

function sha256hex(str){
  // Calcul SHA-256 synchrone via SubtleCrypto — retourne une Promise
  return crypto.subtle.digest("SHA-256",new TextEncoder().encode(str))
    .then(function(buf){return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,"0");}).join("");});
}

    else go({pinErr:true});

function doPromotion(){
  // Étape 1 : avertissement fort
  var msg="⚠️ PROMOTION ANNUELLE\n\n"+
    "Cette action va :\n"+
    "• Faire monter tous les élèves d'une classe\n"+
    "• SUPPRIMER toutes les heures saisies de l annee en cours\n\n"+
    "IMPORTANT : Avant de continuer, exportez le rapport PDF\n"+
    "(onglet Rapport - Imprimer / PDF) pour conserver une trace.\n\n"+
    "Avez-vous bien sauvegardé le rapport de l annee en cours ?";
  if(!confirm(msg))return;
  // Étape 2 : double confirmation
  if(!confirm("CONFIRMATION FINALE\n\nToutes les heures de l annee en cours seront EFFACÉES.\nCette action est irréversible.\n\nContinuer ?"))return;

  // Export CSV automatique avant suppression
  exportCsv();
  go({promoSaved:false,err:"",promoArchiving:true});

  // ── Archivage Firebase complet avant toute suppression ──
  var archiveRef=db.collection("archives").doc(ANNEE);
  db.collection("submissions").get().then(function(snap){
    // 1. Sauvegarder la config (élèves + parents) dans l'archive
    return archiveRef.set({
      annee:ANNEE,
      rentree:RENTREE,
      archivedAt:new Date().toISOString(),
      eleves:ELEVES,
      parents:PARENTS_MAP,
      cheques:CHEQUES_MAP,
      nbSaisies:snap.size
    }).then(function(){
      // 2. Copier chaque saisie dans la sous-collection archives/{ANNEE}/submissions
      var batches=[];
      var batch=db.batch();
      var count=0;
      snap.docs.forEach(function(doc){
        var ref=archiveRef.collection("submissions").doc(doc.id);
        batch.set(ref,doc.data());
        count++;
        if(count===499){batches.push(batch.commit());batch=db.batch();count=0;}
      });
      if(count>0)batches.push(batch.commit());
      return Promise.all(batches);
    }).then(function(){return snap;});
  }).then(function(snap){
    go({promoArchiving:false});
    // ── Suppression des saisies en cours ──
    var batch=db.batch();
    var count=0;
    snap.docs.forEach(function(doc){
      batch.delete(doc.ref);
      count++;
      // Firestore batch max 500
      if(count===499){batch.commit();batch=db.batch();count=0;}
    });
    return batch.commit();
  }).then(function(){
    // Promotion des classes
    var old={};Object.keys(ELEVES).forEach(function(cl){old[cl]=ELEVES[cl].slice();});
    // Propager parents des 3ème vers fratries avant suppression
    var autresEleves=["6ème","5ème","4ème"].reduce(function(a,cl){return a.concat(old[cl]);},[]);
    old["3ème"].forEach(function(e3){
      var parents3=PARENTS_MAP[e3];
      if(!parents3||!parents3.length){delete PARENTS_MAP[e3];return;}
      var fk3=familyKey(e3);
      autresEleves.forEach(function(e2){
        if(familyKey(e2)===fk3){
          if(!PARENTS_MAP[e2])PARENTS_MAP[e2]=[];
          parents3.forEach(function(p){if(PARENTS_MAP[e2].indexOf(p)===-1)PARENTS_MAP[e2].push(p);});
        }
      });
      delete PARENTS_MAP[e3];
    });
    // Décaler les listes d'élèves
    ELEVES["3ème"]=old["4ème"].slice();
    ELEVES["4ème"]=old["5ème"].slice();
    ELEVES["5ème"]=old["6ème"].slice();
    ELEVES["6ème"]=[];
    var newMap={};
    old["4ème"].forEach(function(e){if(PARENTS_MAP[e])newMap[e]=PARENTS_MAP[e];});
    old["5ème"].forEach(function(e){if(PARENTS_MAP[e])newMap[e]=PARENTS_MAP[e];});
    old["6ème"].forEach(function(e){if(PARENTS_MAP[e])newMap[e]=PARENTS_MAP[e];});
    PARENTS_MAP=newMap;
    return fbSaveEl(ELEVES);
  }).then(function(){
    // Remettre les compteurs à zéro dans l'état
    go({subs:[],promoSaved:true,aFilter:"all",aCls:"all",archives:null});
    setTimeout(function(){go({promoSaved:false});},6000);
  }).catch(function(e){
    go({err:"Erreur promotion : "+e.message});
  });
}

function doRestore(annee){
  if(!confirm("⚠️ RESTAURATION DE L'ARCHIVE "+annee+"\n\nCette action va :\n• Supprimer les saisies actuelles\n• Restaurer toutes les saisies de l'archive "+annee+"\n• Restaurer la liste des élèves et parents de "+annee+"\n\nContinuer ?"))return;
  go({restoring:annee,err:""});
  var archiveRef=db.collection("archives").doc(annee);
  // 1. Charger config de l'archive
  archiveRef.get().then(function(doc){
    if(!doc.exists)throw new Error("Archive introuvable");
    var cfg=doc.data();
    // 2. Charger les saisies archivées
    return archiveRef.collection("submissions").get().then(function(snap){
      return {cfg:cfg,snap:snap};
    });
  }).then(function(res){
    var cfg=res.cfg,snap=res.snap;
    // 3. Supprimer les saisies actuelles
    return db.collection("submissions").get().then(function(curSnap){
      var b=db.batch();var c=0;
      curSnap.docs.forEach(function(d){b.delete(d.ref);c++;if(c===499){b.commit();b=db.batch();c=0;}});
      return c>0?b.commit():Promise.resolve();
    }).then(function(){return {cfg:cfg,snap:snap};});
  }).then(function(res){
    var cfg=res.cfg,snap=res.snap;
    // 4. Ré-insérer les saisies archivées
    var b=db.batch();var c=0;
    snap.docs.forEach(function(d){
      var ref=db.collection("submissions").doc(d.id);
      b.set(ref,d.data());c++;
      if(c===499){b.commit();b=db.batch();c=0;}
    });
    return (c>0?b.commit():Promise.resolve()).then(function(){return cfg;});
  }).then(function(cfg){
    // 5. Restaurer config élèves / parents / chèques
    var restoredEleves=cfg.eleves||ELEVES;
    var CLS_ORDER=["6ème","5ème","4ème","3ème"];
    ELEVES={};
    CLS_ORDER.forEach(function(cl){if(restoredEleves[cl]!==undefined)ELEVES[cl]=restoredEleves[cl];});
    Object.keys(restoredEleves).forEach(function(cl){if(!ELEVES[cl])ELEVES[cl]=restoredEleves[cl];});
    PARENTS_MAP=cfg.parents||PARENTS_MAP;
    if(cfg.cheques)CHEQUES_MAP=cfg.cheques;
    return fbSaveEl(ELEVES).then(function(){return fbSaveCheques();});
  }).then(function(){
    // 6. Recharger les saisies
    return fbLoad();
  }).then(function(subs){
    go({subs:subs,restoring:null,restoreDone:annee,aFilter:"all",aCls:"all"});
    setTimeout(function(){go({restoreDone:null});},6000);
  }).catch(function(e){
    go({restoring:null,err:"Erreur restauration : "+e.message});
  });
}

        }
      })
      .catch(function(e){done=true;clearTimeout(timer);showErr(e.message);});
  }catch(e){showErr(e.message);}
})();
</script>

<div id="toast-container"></div>
</body>
</html>
