// Découpe l'année en 3 trimestres égaux continus + 1 été
// T1+T2+T3 couvrent de la rentrée au 30 juin (sans tenir compte des vacances)
function buildTRI(rentreeISO, anneeLabel){
  var d0=new Date(rentreeISO+"T00:00:00");
  var yr=d0.getFullYear(); // ex: 2025
  // Fin d'année scolaire = 30 juin de l'année suivante
  var finAnnee=new Date((yr+1)+"-06-30T23:59:59");
  // Durée totale en ms
  var dur=finAnnee-d0;
  var t=Math.floor(dur/3); // durée d'un trimestre en ms
  var t1s=new Date(d0);
  var t1e=new Date(d0.getTime()+t-1);
  var t2s=new Date(t1e.getTime()+1);
  var t2e=new Date(d0.getTime()+2*t-1);
  var t3s=new Date(t2e.getTime()+1);
  var t3e=new Date(finAnnee);
  // T4 : été (1er juillet → 31 août)
  var t4s=new Date((yr+1)+"-07-01T00:00:00");
  var t4e=new Date((yr+1)+"-08-31T23:59:59");
  function fmt(d){return d.toLocaleDateString("fr-FR",{day:"2-digit",month:"short",year:"2-digit"});}
  return[
    {n:1,l:"T1",s:t1s,e:t1e,m:fmt(t1s)+" → "+fmt(t1e)},
    {n:2,l:"T2",s:t2s,e:t2e,m:fmt(t2s)+" → "+fmt(t2e)},
    {n:3,l:"T3",s:t3s,e:t3e,m:fmt(t3s)+" → "+fmt(t3e)},
    {n:4,l:"T4",s:t4s,e:t4e,m:"Été "+(yr+1)}
  ];
}

function nrm(s){return String(s||"").replace(/æ/gi,"ae").replace(/œ/gi,"oe").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\s+/g," ").trim();}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function rnd(v){return Math.round(v*2)/2;}

  while(i<words.length-1){
    var wc=words[i].replace(/[-\']/g,"");
    if(wc.length>1&&wc===wc.toUpperCase()&&/[A-Z]/.test(wc))i++;
    else break;
  }
  return nrm(words[i]||words[words.length-1]||"").replace(/[,;]/g,"").slice(0,6);
}
// Deux chaînes partagent-elles le même prénom principal ?
function prenomMatch(a,b){
  var na=normPrenom(a), nb=normPrenom(b);
  if(!na||!nb||na.length<3||nb.length<3)return false;
  if(na===nb)return true;
  // Résolution via table d'alias (Joanda=Jean-Daniel, Jean-Yves=Emmanuelle, etc.)
  var ca=canonPrenom(a), cb=canonPrenom(b);
  if(ca&&cb&&ca===cb)return true;
  // Tolérance 1 car (faute de frappe) — uniquement si longueurs égales
  // (évite Laurent ≈ Laure, Sophie ≈ Sophiane)
  var min=Math.min(na.length,nb.length);
  var lenDiff=Math.abs(na.length-nb.length);
  var diff=0;
  for(var i=0;i<min;i++){if(na[i]!==nb[i])diff++;}
  if(lenDiff===0&&diff<=1&&min>=4)return true;
  // Préfixe commun 5 chars UNIQUEMENT si longueurs égales (évite Laurent≠Laure)
  if(lenDiff===0&&min>=5&&na.slice(0,5)===nb.slice(0,5))return true;
  // Tolérance 2 car pour prénoms longs de même longueur
  if(lenDiff===0&&diff<=2&&min>=7)return true;
  return false;
}
// ── EXTRACTION DES PRÉNOMS depuis une saisie ──
function extractPrenoms(s){
  // Gère : "Cathy et Lionel", "Paul & Marie", "sophie", "Cathy"
  var raw=String(s.parents||"").trim();
  var parts;
  if(s.nbParents>=2){
    parts=raw.split(/\s*[&\+]\s*|\s+et\s+/);
    if(parts.length===1)parts=[raw]; // fallback si pas de séparateur
  }else{
    // Même si nbParents=1, peut contenir "Cathy et Lionel"
    parts=raw.split(/\s+et\s+|\s*&\s*/);
  }
  return parts.map(function(p){return p.trim();}).filter(function(p){return p.length>0;});
}
// ── CALCUL DES FAMILLES ───────────────────────
// Une famille = même nom de famille (fratrie incluse)
// Les parents sont regroupés par prénom fuzzy
function computeFamilies(subs){
  var families={};
  subs.forEach(function(s){
    var fk=familyKey(s.eleve);
    if(!families[fk])families[fk]={key:fk,children:{},parents:[],totalH:0,byAct:{},subs:[]};
    var fam=families[fk];
    // Enregistrer l'enfant
    fam.children[s.eleve]=s.classe;
    fam.subs.push(s);
    // Extraire les prénoms
    var prenoms=extractPrenoms(s);
    var hpp=(parseFloat(s.heures)||0)/prenoms.length;
    prenoms.forEach(function(prenom){
      if(!prenom)return;
      // Chercher un parent existant avec prénom similaire (+ alias + NOM Prénom)
      var found=null;
      var npPrenom=normPrenom(prenom); // Extrait le prénom de "NOM Prénom"
      var cpPrenom=canonPrenom(prenom);
      for(var i=0;i<fam.parents.length;i++){
        var par=fam.parents[i];
        // Tester tous les prénoms connus pour ce parent
        var isMatch=par.prenoms.some(function(ep){
          if(prenomMatch(prenom,ep))return true;
          // Comparer aussi les prénoms extraits normalisés
          var npEp=normPrenom(ep),cpEp=canonPrenom(ep);
          if(npPrenom&&npEp&&npPrenom===npEp)return true;
          if(cpPrenom&&cpEp&&cpPrenom===cpEp)return true;
          return false;
        });
        if(isMatch){found=par;break;}
      }
      if(!found){
        found={prenoms:[],totalH:0,byAct:{},byTri:{1:0,2:0,3:0,4:0},subs:[]};
        fam.parents.push(found);
      }
      // Ajouter variation de prénom si nouvelle (via alias aussi)
      var pnrm=nrm(prenom);
      var canon=canonPrenom(prenom);
      var dejavu=found.prenoms.some(function(x){
        return nrm(x)===pnrm||canonPrenom(x)===canon;
      });
      if(!dejavu)found.prenoms.push(prenom);
      // Cumuler heures
      found.totalH+=hpp;
      fam.totalH+=hpp;
      var at=s.activiteType||"Autre";
      found.byAct[at]=(found.byAct[at]||0)+hpp;
      fam.byAct[at]=(fam.byAct[at]||0)+hpp;
      var t=getTri(s.ts);
      if(t)found.byTri[t]+=hpp;
      found.subs.push(s);
    });
  });
  // Ajouter les heures-chèques après calcul des subs réelles
  Object.values(families).forEach(function(fam){
    fam.parents.forEach(function(par){
      var pname=displayPrenom(par.prenoms);
      var ch=chequesH(fam.key,pname);
      par.chequeH=ch;
      par.realH=par.totalH;
      if(ch>0){par.totalH+=ch;fam.totalH+=ch;}
    });
    fam.nbParentsObligation=fam.parents.length; // pour affichage objectif
  });
  return Object.values(families).sort(function(a,b){return a.key.localeCompare(b.key);});
}
// Affichage du prénom principal (le plus long = le plus complet)
function displayPrenom(prenoms){
  if(!prenoms||!prenoms.length)return "";
  // Préférer le prénom le plus court (= prénom seul sans NOM de famille)
  // mais pas moins de 3 chars
  var sorted=prenoms.slice().sort(function(a,b){return a.length-b.length;});
  var best=sorted.find(function(p){return p.trim().length>=3;})||sorted[0];
  return best||"";
}
// Status basé sur le total famille
function status(h){if(h>=OBJ)return"complete";var a=hAtt();if(a<=0||h>=a)return"ok";if(h>=a*.7)return"warn";return"late";}
function badge(s){if(s==="complete")return'<span class="badge bg2">Objectif atteint ✓</span>';if(s==="ok")return'<span class="badge bg2">À jour</span>';if(s==="warn")return'<span class="badge ba">Vigilance</span>';return'<span class="badge br2">En retard</span>';}
function fcls(s){return(s==="complete"||s==="ok")?"fg":s==="warn"?"fa":"fr";}
function catPills(byAct){
  return'<div class="cat-bar">'+Object.keys(byAct).map(function(k){
    return'<span class="cat-pill">'+esc(k)+' <span>'+rnd(byAct[k])+'h</span></span>';
  }).join("")+'</div>';
}
// ── INDEX COMPLET (saisies + ELEVES sans heures) ────────────
function buildFullFamilies(subs){
  var base=computeFamilies(subs||[]);
  var idx={};
  base.forEach(function(f){idx[f.key]=f;});
  Object.keys(ELEVES).forEach(function(cl){
    ELEVES[cl].forEach(function(e){
      var fk=familyKey(e);
      if(!idx[fk])idx[fk]={key:fk,children:{},parents:[],totalH:0,byAct:{},subs:[],ghost:true};
      var fam=idx[fk];
      // Ajouter l'enfant uniquement si son nom normalisé n'existe pas déjà
      var eNrm=nrm(e);
      var childExists=Object.keys(fam.children).some(function(k){return nrm(k)===eNrm;});
      if(!childExists)fam.children[e]=cl;
      (PARENTS_MAP[e]||[]).forEach(function(p){
        var already=fam.parents.some(function(par){
          return par.prenoms.some(function(pr){
            if(nrm(pr)===nrm(p))return true;
            if(prenomMatch(pr,p))return true;
            // Comparer prénoms extraits (ignore NOM de famille)
            var na=normPrenom(pr),nb=normPrenom(p);
            if(na&&nb&&(na===nb||canonPrenom(pr)===canonPrenom(p)))return true;
            return false;
          });
        });
        if(!already){
          var ch=chequesH(fk,p);
          fam.parents.push({prenoms:[p],totalH:ch,chequeH:ch,realH:0,byAct:{},byTri:{1:0,2:0,3:0,4:0},subs:[]});
          fam.totalH+=ch;
        }
      });
    });
  });
  return Object.values(idx).sort(function(a,b){return a.key.localeCompare(b.key);});
}

function portalResults(){

  if(!S.subs)return'<div class="loader"><div class="spin"></div>Chargement\u2026</div>';
  var qn=nrm(q);

  // Index complet via helper partagé
  var allFamsComplete=buildFullFamilies(S.subs);

  // ── Filtre de recherche ──────────────────────────────────────────────────
  var found=allFamsComplete.filter(function(f){
    // 1. Nom de famille
    if(nrm(f.key).includes(qn))return true;
    // 2. N'importe quel mot du nom complet d'un enfant (prénom ou NOM)
    if(Object.keys(f.children).some(function(ch){
      return nrm(ch).split(' ').some(function(w){return w.length>1&&w.startsWith(qn)||nrm(ch).includes(qn);});
    }))return true;
    // 3. Prénom d'un parent (toutes sources)
    var allParNames=[];
    f.parents.forEach(function(par){par.prenoms.forEach(function(pr){allParNames.push(nrm(pr));});});
    // Ajouter aussi parents PARENTS_MAP non encore dans f.parents
    Object.keys(PARENTS_MAP).forEach(function(e){
      if(familyKey(e)===f.key)(PARENTS_MAP[e]||[]).forEach(function(p){
        if(allParNames.indexOf(nrm(p))===-1)allParNames.push(nrm(p));
      });
    });
    if(allParNames.some(function(pn){return pn.includes(qn);}))return true;
    return false;
  });

  if(!found.length)return'<p class="empty">Aucun résultat pour <strong>'+esc(q)+'</strong><br><span style="font-size:12px;color:var(--mu)">Essayez le nom de famille, le prénom de l\'éève ou d\'un parent</span></p>';

  return found.sort(function(a,b){return a.key.localeCompare(b.key);}).map(function(f){
    // Recalcul propre des chèques (les parents fantômes ont déjà chequeH)
    var totCheqR=f.parents.reduce(function(a,par){return a+(par.chequeH||0);},0);
    var nbPar=f.parents.length||1;
    var famObj2=nbPar*OBJ;
    var s=f.totalH>=famObj2?"complete":status(f.totalH);
    var p2=pct(f.totalH,famObj2);
    var enfants=Object.keys(f.children).map(function(ch){return ch+" ("+f.children[ch]+")";}).join(", ");
    // Liste des parents (PARENTS_MAP en priorité pour l'affichage)
    var dispPars=[];
    Object.keys(PARENTS_MAP).forEach(function(e){
      if(familyKey(e)===f.key)(PARENTS_MAP[e]||[]).forEach(function(p){
        if(dispPars.indexOf(p)===-1)dispPars.push(p);
      });
    });
    if(!dispPars.length)dispPars=f.parents.map(function(par){return displayPrenom(par.prenoms);});
    var parentsDisp=dispPars.join(' \u00b7 ');
    // Affichage des heures
    var hoursDisplay;
    if(f.totalH===0){
      hoursDisplay='<div style="font-size:12px;color:var(--mu);font-style:italic;margin-top:2px">Aucune heure d\u00e9clar\u00e9e</div>';
    }else if(f.subs&&f.subs.length===0&&totCheqR>0){
      hoursDisplay='<div style="font-size:20px;font-weight:700;color:var(--am)">'+rnd(totCheqR)+'h</div>'+
        '<div style="font-size:10px;color:var(--am)">\uD83D\uDCB3 ch\u00e8que(s)</div>';
    }else{
      hoursDisplay='<div style="font-size:22px;font-weight:700;color:var(--red)">'+rnd(f.totalH)+'h</div>'+
        (totCheqR>0?'<div style="font-size:10px;color:var(--am)">dont '+rnd(totCheqR)+'h \uD83D\uDCB3</div>':'')+
        '<div style="font-size:10px;color:var(--mu)">/ '+famObj2+'h</div>';
    }
    return'<button class="li" style="margin-bottom:10px" data-a="portal-sel" data-key="'+esc(f.key)+'">'+
      '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">'+

            '<div class="sn">'+cl.replace("ème","")+'</div><div class="sl2">'+cl+'</div></div>';
        }).join("")+'</div>';
    case 1:
      var list=(ELEVES[f.cl]||[]).filter(function(e){return!S.eleveQ||nrm(e).includes(nrm(S.eleveQ));});
      // Récupérer les parents connus pour cet enfant
      var knownParents=[];
      if(S.subs&&f.cl){
        var fs2=computeFamilies(S.subs);
        var fk=familyKey(f.cl+"_dummy");
        fs2.forEach(function(fam){
          Object.keys(fam.children).forEach(function(ch){
            if(ch===f.eleve||(!f.eleve&&fam.children[ch]===f.cl)){

        '<div style="margin-top:10px">'+(list.map(function(e){
          // Chercher les parents connus pour cet enfant

            PARENTS_MAP[e].forEach(function(p){if(p)pknown.push(p);});
          }
          // 2. Depuis les saisies Firebase si aucun parent enregistré
          if(pknown.length===0&&S.subs){
            var fkE=familyKey(e);
            computeFamilies(S.subs).forEach(function(fam){
              if(fam.key===fkE){
                Object.keys(fam.children).forEach(function(ch){

    case 5:

      var rows=[["Classe",f.cl,0],["Élève",f.eleve,1],["Parent(s)",parents,2],["Activité",f.typeAct,3],["Sous-activité",f.sousAct,3],["Heures",hf+"h",4]];

        (S.sendErr?'<div class="al ae">'+esc(S.sendErr)+'</div>':"")+
        '<div class="mt20"><button class="btn bp" '+(S.sending?"disabled":"")+' data-a="submit">'+(S.sending?"Envoi…":"Confirmer et enregistrer")+'</button></div>';
  }
  return"";
}

function rHeures(fs){

function rSaisies(subs){
  // ── Étape 1 : filtrer par texte libre ────────────────────────
  var q=nrm(S.aSubQ||"");
  var step1=subs.filter(function(s){
    return !q||nrm(s.eleve+" "+s.parents+" "+s.sousActivite+" "+s.activiteType).includes(q);
  });
  // ── Étape 2 : suggestions parents pour l'élève recherché ──────
  var parentSuggestions=[];
  if(q.length>=2){
    // Collecter tous les parents uniques des saisies filtrées
    var pSet={};
    step1.forEach(function(s){
      (s.parents||"").split(/\s*[&]\s*|\s+et\s+/).forEach(function(p){
        var pn=p.trim();
        if(pn&&!pSet[nrm(pn)]){pSet[nrm(pn)]=pn;}
      });
    });
    // Ajouter aussi les parents de PARENTS_MAP pour les élèves trouvés
    step1.forEach(function(s){
      var fk=familyKey(s.eleve);
      Object.keys(PARENTS_MAP).forEach(function(e){
        if(familyKey(e)===fk)(PARENTS_MAP[e]||[]).forEach(function(p){
          if(!pSet[nrm(p)])pSet[nrm(p)]=p;
        });
      });
    });
    parentSuggestions=Object.values(pSet).sort();
  }
  // ── Étape 3 : filtre par parents sélectionnés ────────────────
  var selPars=S.saisiesParents||[];
  var filtered=selPars.length===0?step1:step1.filter(function(s){
    return selPars.some(function(sp){
      return prenomMatch(sp,s.parents)||nrm(s.parents).includes(nrm(sp));
    });
  });
  // ── Total par activité ────────────────────────────────────────
  var actTotals={};
  filtered.forEach(function(s){
    var k=s.activiteType+" · "+s.sousActivite;
    actTotals[k]=(actTotals[k]||0)+(parseFloat(s.heures)||0);

  var totalH=filtered.reduce(function(a,s){return a+(parseFloat(s.heures)||0);},0);

      '</div>';

    totActH='<div style="background:var(--bg);border:1px solid var(--bd);border-radius:var(--rs);margin-bottom:12px;overflow:hidden">'+
      // En-tête cliquable
      '<div data-a="tog-acts-table" style="display:flex;justify-content:space-between;align-items:center;padding:10px;cursor:pointer">'+
        '<div>'+
          '<span style="font-size:12px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.04em">Total par activité</span>'+
          '<span style="font-size:13px;font-weight:700;color:var(--red);margin-left:10px">'+rnd(totalH)+'h</span>'+
          '<span style="font-size:11px;color:var(--mu);margin-left:6px">('+Object.keys(actTotals).length+' activités)</span>'+
        '</div>'+
        '<span style="font-size:14px;color:var(--mu)">'+(isOpen?'▲':'▼')+'</span>'+
      '</div>'+
      // Corps déroulable
      (isOpen?
        '<div style="padding:0 10px 10px">'+
          actRows+
        '</div>':'')+
    '</div>';
  }
  // ── Chips parents ─────────────────────────────────────────────
  var parentChips='';
  if(parentSuggestions.length>0){
    parentChips='<div style="margin-bottom:10px">'+
      '<div style="font-size:11px;font-weight:700;color:var(--mu);margin-bottom:5px">Filtrer par parent :</div>'+
      '<div style="display:flex;flex-wrap:wrap;gap:6px">'+
      parentSuggestions.map(function(p){
        var on=selPars.indexOf(p)!==-1;
        return'<button class="fc2'+(on?' on':'')+'" data-a="tog-par-filter" data-p="'+esc(p)+'">'+esc(p)+'</button>';
      }).join('')+
      (selPars.length>0?'<button class="fc2" data-a="clear-par-filter" style="color:var(--red)">✕ Tout</button>':'')+
      '</div></div>';
  }
  // ── Liste ──────────────────────────────────────────────────────
  var listH=filtered.length?filtered.map(function(s){
    var d=new Date(s.ts),t=getTri(s.ts);
    return'<div class="si" style="'+(S.deleting===s.id?"opacity:.4":"")+'" >'+
      '<div style="display:flex;justify-content:space-between;align-items:flex-start">'+
        '<div style="flex:1;margin-right:10px">'+
          '<div style="font-size:13px;font-weight:700">'+esc(s.eleve)+" · "+esc(s.classe)+'</div>'+
          '<div style="font-size:12px;color:var(--mu)">'+esc(s.parents)+'</div>'+
          '<div style="font-size:12px">'+esc(s.activiteType)+" → "+esc(s.sousActivite)+'</div>'+
          '<div style="font-size:11px;color:var(--mu)">'+d.toLocaleDateString("fr-FR",{day:"numeric",month:"short",year:"numeric"})+(t?" · T"+t:"")+(s.manualEntry?'<span style="font-size:10px;background:#E8F5EE;color:#2E7D4F;border-radius:8px;padding:1px 5px;margin-left:4px">✏️ admin</span>':'')+'</div>'+
        '</div>'+
        '<div style="text-align:right;flex-shrink:0">'+
          '<div style="font-size:18px;font-weight:700;color:var(--red)">'+s.heures+'h</div>'+
          '<button style="font-size:11px;color:var(--red);background:none;border:none;cursor:pointer;font-family:inherit" data-a="del" data-id="'+esc(s.id)+'">'+(S.deleting===s.id?"…":"Supprimer")+'</button>'+

  return'<div class="sbar">'+
      '<input class="inp" id="sq" placeholder="Rechercher élève, parent, activité…" value="'+esc(S.aSubQ||"")+'" autocomplete="off">'+

}

function rRapport(fs,tot){
  // Filtrer les subs aux élèves présents dans ELEVES (exclure anciens élèves supprimés)
  var elevesActuels=[];
  Object.keys(ELEVES).forEach(function(cl){elevesActuels=elevesActuels.concat(ELEVES[cl]);});
  var subsActuels=(S.subs||[]).filter(function(s){
    var eNrm=nrm(s.eleve);
    return elevesActuels.some(function(e){return nrm(e)===eNrm;});
  });
  // Inclure TOUTES les familles actuelles (même sans heures)
  var fsAll=buildFullFamilies(subsActuels);
  var OBJ=40;
  var dt=new Date().toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric"});
  var allParents=[];
  fsAll.forEach(function(f){f.parents.forEach(function(p){allParents.push(p);});});
  var nOk=allParents.filter(function(p){return p.totalH>=OBJ;}).length;
  var nZero=allParents.filter(function(p){return p.totalH===0;}).length;
  function slabel(h,isCheque){
    if(isCheque&&h>0)return["Chèque(s)","#8B6000","#FFF8E1"];
    if(h>=OBJ)return["Objectif atteint","#2E7D4F","#E8F5EE"];
    if(h>=30)return["Bon avancement","#2E7D4F","#E8F5EE"];
    if(h>=20)return["En cours","#8B6000","#FFF8E1"];
    if(h>=10)return["À renforcer","#C0472A","#F5EAE7"];
    if(h>0)return["Insuffisant","#C0472A","#FDECEA"];
    return["Aucune heure","#999","#F5F5F5"];
  }
  var rows=fsAll.map(function(f){
    var enfants=Object.keys(f.children).join(" + ");
    var classes=Object.values(f.children).filter(function(v,i,a){return a.indexOf(v)===i;}).join(" / ");
    var famTot=rnd(f.totalH||0);
    var famCheqTot=f.parents.reduce(function(a,par){return a+(par.chequeH||0);},0);
    var parRows=f.parents.map(function(par){
      var ph=par.totalH||0;
      var ch=par.chequeH||0;
      var realH=ph-ch;
      var onlyCheque=(realH===0&&ch>0);
      var lbl=slabel(ph,onlyCheque),pp=Math.min(100,Math.round(ph/OBJ*100));
      var pname=displayPrenom(par.prenoms);
      var cats=Object.keys(par.byAct).map(function(k){return esc(k)+": "+rnd(par.byAct[k])+"h";}).join(" · ");
      // Détail heures
      var heureDetail='';
      if(onlyCheque){
        heureDetail='<span style="font-size:10px;background:#FFF8E1;color:#8B6000;border-radius:8px;padding:1px 5px;margin-left:4px">'+
          Math.round(ch/10)+' chèque'+(ch>=20?'s':'')+'</span>';
      }else if(ch>0){
        heureDetail='<span style="font-size:10px;color:#8B6000;margin-left:4px">dont '+rnd(ch)+'h 💳</span>';
      }
      var noHoursNote=ph===0?'<div style="font-size:11px;color:#999;font-style:italic">Aucune heure déclarée</div>':'';
      return'<tr style="background:#FAFAF8;border-bottom:1px solid #EEE">'+
        '<td style="padding:7px 10px 7px 22px;font-size:12px;color:#444;vertical-align:middle">'+
          '<span style="color:#999;margin-right:4px">↳</span><strong>'+esc(pname)+'</strong>'+
          (par.prenoms.length>1?'<span style="font-size:10px;color:#aaa;margin-left:6px">(aussi: '+esc(par.prenoms.filter(function(x){return x!==pname;}).join(", "))+')</span>':"")+
          heureDetail+
          (cats?'<div style="font-size:11px;color:#888;margin-top:2px">'+cats+'</div>':"")+
          noHoursNote+
        '</td>'+
        '<td style="padding:7px 10px;font-weight:700;font-size:14px;color:'+lbl[1]+';text-align:right;vertical-align:middle;white-space:nowrap">'+
          (ph===0?'<span style="color:#bbb">—</span>':rnd(ph)+'h')+
        '</td>'+
        '<td style="padding:7px 10px;vertical-align:middle;min-width:150px">'+
          (ph>0?
            '<div style="height:6px;background:#E0D9D3;border-radius:3px;overflow:hidden;margin-bottom:3px">'+
              '<div style="height:100%;width:'+pp+'%;background:'+lbl[1]+';border-radius:3px"></div>'+
            '</div>':
            '<div style="height:6px;background:#E0D9D3;border-radius:3px;margin-bottom:3px"></div>'
          )+
          '<span style="font-size:10px;background:'+lbl[2]+';color:'+lbl[1]+';padding:2px 7px;border-radius:10px;font-weight:700">'+pp+'% — '+lbl[0]+'</span>'+
        '</td>'+
      '</tr>';
    }).join("");
    // Ligne famille
    var famBg=f.totalH===0?"#FFF5F5":"#F7F4F1";
    var famExtra=famCheqTot>0&&f.subs&&f.subs.length===0?
      '<span style="font-size:11px;background:#FFF8E1;color:#8B6000;padding:1px 6px;border-radius:8px;margin-left:8px">💳 chèques uniquement</span>':"";
    return'<tr style="border-top:2px solid #C0472A">'+
      '<td colspan="3" style="padding:10px;background:'+famBg+'">'+
        '<span style="font-weight:700;font-size:14px">'+esc(enfants)+'</span>'+
        '<span style="font-size:11px;color:#888;margin-left:8px">'+esc(classes)+'</span>'+
        '<span style="font-size:12px;color:#7A7268;margin-left:12px">Total famille : <strong style="color:'+(f.totalH>0?"#C0472A":"#bbb")+'">'+
          (f.totalH===0?"—":famTot+"h")+
        '</strong></span>'+famExtra+
      '</td>'+
    '</tr>'+parRows;
  }).join("");
  var legendH='<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;font-size:11px">'+
    '<span style="font-weight:700;color:var(--mu);margin-right:4px">Objectif : 40h / parent —</span>'+
    [["≥40h Objectif atteint","#2E7D4F","#E8F5EE"],["≥30h Bon avancement","#2E7D4F","#E8F5EE"],["≥20h En cours","#8B6000","#FFF8E1"],["≥10h À renforcer","#C0472A","#F5EAE7"],["<10h Insuffisant","#C0472A","#FDECEA"],["Chèque(s)","#8B6000","#FFF8E1"],["Aucune heure","#999","#F5F5F5"]].map(function(l){
      return'<span style="background:'+l[2]+';color:'+l[1]+';padding:2px 8px;border-radius:10px;font-weight:600">'+l[0]+'</span>';
    }).join("")+
  '</div>';
  var table='<div style="overflow-x:auto">'+
    '<table style="width:100%;border-collapse:collapse;font-size:13px">'+
      '<thead><tr style="background:var(--bg)">'+
        '<th style="padding:9px 10px;text-align:left;font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:.04em;border-bottom:2px solid var(--bd)">Enfant(s) / Parent</th>'+
        '<th style="padding:9px 10px;text-align:right;font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:.04em;border-bottom:2px solid var(--bd)">Heures</th>'+
        '<th style="padding:9px 10px;text-align:left;font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:.04em;border-bottom:2px solid var(--bd)">Progression / 40h</th>'+
      '</tr></thead>'+
      '<tbody>'+rows+'</tbody>'+
    '</table>'+
  '</div>';
  var statsH='<div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:20px">'+
    [["Familles",fsAll.length,"var(--red)"],["Parents recensés",allParents.length,"var(--red)"],["Objectif atteint ✓",nOk+" parents","var(--gn)"],["Sans heures",nZero+" parents","var(--mu)"]].map(function(s){
      return'<div class="sc"><div class="sv" style="font-size:18px;color:'+s[2]+'">'+s[1]+'</div><div class="slbl">'+s[0]+'</div></div>';
    }).join("")+
  '</div>';
  return'<div id="rapport-content">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">'+
      '<div>'+
        '<h2 style="font-size:17px;font-weight:700">Rapport d\'investissement</h2>'+
        '<p style="font-size:12px;color:var(--mu)">Édition du '+dt+' · '+ANNEE+' · Objectif : 40h / parent</p>'+
      '</div>'+
      '<button class="btn bp bsm" onclick="printRapport()">🖨️ Imprimer / PDF</button>'+
    '</div>'+
    statsH+legendH+table+
    '<p style="font-size:11px;color:var(--mu);margin-top:10px;text-align:right">Clardeluna '+ANNEE+' · Généré le '+dt+'</p>'+
  '</div>';
}

function doManSaisie(){

  if(isNaN(heures)||heures<=0){go({manErr:"Veuillez indiquer le nombre d'heures"});return;}

  go({manSaving:true,manErr:''});
  fbAdd(pl).then(function(ref){
    var ns=Object.assign({id:ref.id},pl);
    // Ajouter en tête de liste (ordre anti-chron.) + passer sur l'onglet Saisies
    var newSubs=[ns].concat(S.subs||[]);

}

function onClick(e){
  var el=e.target.closest("[data-a]");if(!el){reattach();return;}
  var a=el.dataset.a,v=el.dataset.v;
  var nf={cl:"",eleve:"",nbParents:1,p1:"",p2:"",typeAct:"",sousAct:"",heures:""};
  switch(a){
    case"go-home":go({page:"home"});break;
    case"go-portal":go({page:"portal",portalQ:""});break;
    case"go-form":go({page:"form",step:0,form:nf,done:false,sendErr:"",eleveQ:""});break;
    case"go-login":go({page:"login",pinInput:"",pinErr:false});break;
    case"back":
      if(v==="form-back"){saveInputs();S.step===0?go({page:"home"}):go({step:S.step-1});}
      else go({page:v});break;
    case"s0":go(function(s){return{step:1,form:Object.assign({},s.form,{cl:v,eleve:""}),eleveQ:""};});break;
    case"s1":go(function(s){return{step:2,form:Object.assign({},s.form,{eleve:v,p1:'',p2:'',nbParents:1})};});break;
    case"nb":saveInputs();go(function(s){return{form:Object.assign({},s.form,{nbParents:parseInt(v)})};});break;
    case"next":saveInputs();go({step:S.step+1});break;
    case"goto":saveInputs();go({step:parseInt(v)});break;
    case"s3t":go(function(s){return{form:Object.assign({},s.form,{typeAct:v,sousAct:""})};});break;
    case"s3a":go(function(s){return{form:Object.assign({},s.form,{sousAct:v})};});break;
    case"sh":go(function(s){return{form:Object.assign({},s.form,{heures:v})};});break;
    case"pick-parent":
      // Clic sur un bouton de parent connu → remplit p1 ou p2
      var pp=el.dataset.p;
      var ip1=document.getElementById("ip1");
      if(ip1&&!ip1.value.trim()){ip1.value=pp;sil(function(s){return{form:Object.assign({},s.form,{p1:pp})};});var bn2e=document.getElementById("bn2");if(bn2e)bn2e.disabled=false;}
      else{var ip2=document.getElementById("ip2");if(ip2){ip2.value=pp;sil(function(s){return{form:Object.assign({},s.form,{p2:pp})};});}}
      reattach();break;
    case"sel-parent":
      var selP2=el.dataset.p;
      go(function(s){
        var f2=Object.assign({},s.form);
        if(f2.p1===selP2){f2.p1=f2.p2||'';f2.p2='';}
        else if(f2.p2===selP2){f2.p2='';}
        else if(!f2.p1){f2.p1=selP2;}
        else if(!f2.p2){f2.p2=selP2;}
        else{f2.p2=selP2;}
        f2.nbParents=(f2.p1&&f2.p2)?2:(f2.p1?1:0);
        return{form:f2};
      });break;
        case"submit":saveInputs();doSubmit();break;
    case"new-form":go({page:"form",step:0,form:nf,done:false,sendErr:"",eleveQ:""});break;
    case"portal-sel":
      var key=el.dataset.key;
      var allFams=computeFamilies(S.subs||[]);
      var fm=allFams.find(function(f){return f.key===key;});
      if(fm)go({page:"portal-view",portalFam:fm});break;
    case"man-cl":go({manCl:v,manEleve:'',manParent:'',manSousAct:'',manHeures:''});break;
    case"man-eleve":go({manEleve:v,manParent:''});break;
    case"man-parent":go({manParent:v});break;
    case"man-type":go({manTypeAct:v,manSousAct:''});break;
    case"man-sous":go({manSousAct:v});break;
    case"man-h":
      var mhI=document.getElementById('man-h-inp');if(mhI)mhI.value=v;
      go({manHeures:v});break;
    case"man-submit":
      var mhS=document.getElementById('man-h-inp');if(mhS&&mhS.value)sil({manHeures:mhS.value});
      var mdS=document.getElementById('man-date');if(mdS&&mdS.value)sil({manDate:mdS.value});
      doManSaisie();break;
        case"toggle-cat":
      go({actsCatOpen:S.actsCatOpen===el.dataset.cat?null:el.dataset.cat,actsSaved:false});break;
    case"close-cat":go({actsCatOpen:null});break;
    case"add-cat":
      var ncEl=document.getElementById("new-cat-inp"),ncv=ncEl?ncEl.value.trim():"";
      if(!ncv){alert("Saisissez un nom de catégorie");break;}
      if(ACTS[ncv]){alert("Cette catégorie existe déjà");break;}
      ACTS[ncv]=[];
      go({actsCatOpen:ncv,actsSaved:false});break;
    case"del-cat":
      var dc=el.dataset.cat;
      if(!confirm("Supprimer la catégorie \""+dc+"\" et toutes ses activités ?"))break;
      delete ACTS[dc];
      go({actsCatOpen:null,actsSaved:false});break;
    case"add-act":
      var aCat=el.dataset.cat;
      var naId="new-act-"+aCat.replace(/[^a-z0-9]/gi,"");
      var naEl=document.getElementById(naId),nav=naEl?naEl.value.trim():"";
      if(!nav){alert("Saisissez un nom d\'activité");break;}
      if((ACTS[aCat]||[]).indexOf(nav)!==-1){alert("Cette activité existe déjà");break;}
      if(!ACTS[aCat])ACTS[aCat]=[];
      ACTS[aCat]=ACTS[aCat].concat([nav]);
      go({actsSaved:false});break;
    case"del-act":
      var daCat=el.dataset.cat,daIdx=parseInt(el.dataset.idx);
      var daAct=ACTS[daCat]&&ACTS[daCat][daIdx];
      if(!daAct)break;
      if(!confirm("Supprimer l\'activité \""+daAct+"\" ?"))break;
      ACTS[daCat]=ACTS[daCat].filter(function(_,i){return i!==daIdx;});
      go({actsSaved:false});break;
    case"move-act-up":
      var muCat=el.dataset.cat,muIdx=parseInt(el.dataset.idx);
      if(muIdx>0){var arr=ACTS[muCat].slice();var t2=arr[muIdx-1];arr[muIdx-1]=arr[muIdx];arr[muIdx]=t2;ACTS[muCat]=arr;}
      go({actsSaved:false});break;
    case"move-act-dn":
      var mdCat=el.dataset.cat,mdIdx=parseInt(el.dataset.idx);
      if(mdIdx<ACTS[mdCat].length-1){var arr2=ACTS[mdCat].slice();var t3=arr2[mdIdx+1];arr2[mdIdx+1]=arr2[mdIdx];arr2[mdIdx]=t3;ACTS[mdCat]=arr2;}
      go({actsSaved:false});break;
    case"save-acts":
      go({actsSaving:true,actsSaved:false,actsErr:""});
      fbSaveActs().then(function(){
        go({actsSaving:false,actsSaved:true});
        setTimeout(function(){go({actsSaved:false});},3000);
      }).catch(function(e){go({actsSaving:false,actsErr:"Erreur : "+e.message});});
      break;
        case"tog-acts-table":go({saisiesTableOpen:!S.saisiesTableOpen});break;
    case"tog-par-filter":
      var tp=el.dataset.p;
      var cur=S.saisiesParents.slice();
      var ti=cur.indexOf(tp);
      if(ti===-1)cur.push(tp);else cur.splice(ti,1);
      go({saisiesParents:cur});break;
    case"clear-par-filter":go({saisiesParents:[]});break;
        case"check-pin":checkPin();break;
    case"tab":go({adminTab:v,saisiesParents:[],aSubQ:""});break;
    case"fcls":go({aCls:v});break;
    case"fst":go({aFilter:v});break;
    case"do-search":
      var pqEl=document.getElementById("pq");
      if(pqEl)sil({portalQ:pqEl.value});
      doSearch();
      break;
    case"del":doDel(el.dataset.id);break;
    case"csv":exportCsv();break;
    case"toggle-classe":go({elevesOpen:S.elevesOpen===el.dataset.cl?null:el.dataset.cl,regSaved:false});break;
    case"close-classe":go({elevesOpen:null});break;
    case"edit-eleve-name":go({editEleveKey:el.dataset.ekey,regSaved:false});break;
    case"cancel-edit-eleve":go({editEleveKey:null});break;
    case"save-eleve-name":
      var seCl=el.dataset.cl,seIdx=parseInt(el.dataset.idx);
      var seInp=document.getElementById("edit-eleve-inp");
      var seNom=seInp?seInp.value.trim():"";
      if(seNom.length<2){alert("Nom trop court");break;}
      var oldNom=ELEVES[seCl][seIdx];
      if(seNom===oldNom){go({editEleveKey:null});break;}
      if(ELEVES[seCl].indexOf(seNom)!==-1){alert("Cet élève existe déjà");break;}
      // Mettre à jour ELEVES
      ELEVES[seCl][seIdx]=seNom;
      // Migrer PARENTS_MAP
      if(PARENTS_MAP[oldNom]){PARENTS_MAP[seNom]=PARENTS_MAP[oldNom];delete PARENTS_MAP[oldNom];}
      // Migrer CHEQUES_MAP
      var oldFk=familyKey(oldNom),newFk=familyKey(seNom);
      Object.keys(CHEQUES_MAP).forEach(function(k){
        if(k.startsWith(oldFk+"_")){
          var newKey=newFk+k.slice(oldFk.length);
          CHEQUES_MAP[newKey]=CHEQUES_MAP[k];
          delete CHEQUES_MAP[k];
        }
      });
      go({editEleveKey:null,regSaved:false});break;
    case"del-eleve":
      var dcl=el.dataset.cl,didx=parseInt(el.dataset.idx);
      if(confirm("Supprimer cet élève et ses parents enregistrés ?")){
        var eName=ELEVES[dcl][didx];
        delete PARENTS_MAP[eName];
        ELEVES[dcl]=ELEVES[dcl].filter(function(_,i){return i!==didx;});
        go({regSaved:false});
      }break;
    case"add-parent":
      var aEl=el.dataset.el,iid=el.dataset.iid;
      var ni2=document.getElementById(iid);
      var pnom=ni2?ni2.value.trim():"";
      if(pnom.length<2){alert("Saisissez un prénom valide");break;}
      if(!PARENTS_MAP[aEl])PARENTS_MAP[aEl]=[];
      if(PARENTS_MAP[aEl].indexOf(pnom)===-1){PARENTS_MAP[aEl].push(pnom);}
      go({regSaved:false});break;
    case"del-parent":
      var dpEl=el.dataset.el,dpPi=parseInt(el.dataset.pi);
      if(PARENTS_MAP[dpEl]){
        PARENTS_MAP[dpEl]=PARENTS_MAP[dpEl].filter(function(_,i){return i!==dpPi;});
        if(PARENTS_MAP[dpEl].length===0)delete PARENTS_MAP[dpEl];
        go({regSaved:false});
      }break;
    case"add-eleve":
      var acl=el.dataset.cl;
      var ni=document.getElementById("ne-"+acl.replace(/[^a-z0-9]/gi,""));
      var nom=ni?ni.value.trim():"";
      if(nom.length<2){alert("Saisissez un nom valide");break;}
      if(ELEVES[acl].indexOf(nom)!==-1){alert("Cet élève est déjà dans la liste");break;}
      ELEVES[acl]=ELEVES[acl].concat([nom]).sort();go({regSaved:false});break;
    case"set-cheque":
      var ck2=el.dataset.ck,ckv=parseInt(el.value||"0");
      CHEQUES_MAP[ck2]=ckv;
      fbSaveCheques().then(function(){
        el.style.background="#E8F5EE";
        setTimeout(function(){el.style.background="";},1200);
      }).catch(function(e){go({err:"Erreur chèque: "+e.message});});
      reattach();break;
    case"save-eleves":doSaveEleves();break;
    case"do-promote":doPromotion();break;
    case"save-annee":
      var riEl=document.getElementById("rentree-inp");
      var aiEl=document.getElementById("annee-inp");
      var newRentree=riEl?riEl.value.trim():"";
      var newAnnee=aiEl?aiEl.value.trim():"";
      if(!newRentree||!newAnnee){alert("Renseignez la date de rentrée et le libellé de l\'année");break;}
      // Validation date
      var testD=new Date(newRentree);
      if(isNaN(testD)){alert("Date de rentrée invalide");break;}
      go({anneeSaving:true,anneeSaved:false});
      RENTREE=newRentree;
      ANNEE=newAnnee;
      TRI=buildTRI(RENTREE,ANNEE);
      document.title="Clardeluna "+ANNEE;
      fbSaveAnnee().then(function(){
        go({anneeSaving:false,anneeSaved:true});
        setTimeout(function(){go({anneeSaved:false});},3000);
      }).catch(function(e){go({anneeSaving:false,err:"Erreur année : "+e.message});});
      break;
    case"save-pin":
      var npEl=document.getElementById("np"),npv=npEl?npEl.value.trim():"";
      if(npv.length<4){alert("Code PIN trop court");break;}
      PIN=npv;go({pinSaved:true});setTimeout(function(){go({pinSaved:false});},3000);break;
  }
  reattach();
}
// ── ASYNC ─────────────────────────────────────
function loadSubs(){
  if(S.subs!==null||S.loading)return;
  sil({loading:true,err:""});
  fbLoad().then(function(subs){go({subs:subs,loading:false});})
          .catch(function(e){go({loading:false,err:"Erreur Firebase : "+e.message});});
}
function doSearch(){
  var pqEl=document.getElementById("pq");
  if(pqEl)sil({portalQ:pqEl.value});
  if(S.subs!==null){
    // Data already loaded - just update results div
    var res=document.getElementById("portal-results");
    if(res){res.innerHTML=portalResults();reattach();return;}
  }
  // Need to load data first
  if(S.loading)return;
  sil({loading:true,err:""});
  // Show spinner in results
  var res=document.getElementById("portal-results");
  if(res)res.innerHTML='<div class="loader"><div class="spin"></div>Recherche en cours…</div>';
  fbLoad().then(function(subs){
    sil({subs:subs,loading:false});
    var r=document.getElementById("portal-results");
    if(r){r.innerHTML=portalResults();reattach();}
    // Also hide loading indicator if any
  }).catch(function(e2){
    sil({loading:false,err:"Erreur : "+e2.message});
    var r=document.getElementById("portal-results");
    if(r){r.innerHTML='<div class="al ae">'+esc(S.err)+'</div>';reattach();}
  });
}
function checkPin(){
  var pi=document.getElementById("pi");
  if((pi?pi.value:S.pinInput)===PIN){go({page:"admin",adminTab:"overview",err:""});loadSubs();}
  else go({pinErr:true});
}
function doSubmit(){
  var f=S.form;go({sending:true,sendErr:""});
  var pl={classe:f.cl,eleve:f.eleve,nbParents:f.nbParents,parents:f.nbParents===2?(f.p1+" & "+f.p2):f.p1,activiteType:f.typeAct,sousActivite:f.sousAct,heures:parseFloat(f.heures)};
  fbAdd(pl).then(function(ref){
    var ns=Object.assign({id:ref.id,ts:new Date().toISOString()},pl);
    go({sending:false,done:true,subs:(S.subs||[]).concat([ns])});
  }).catch(function(e){go({sending:false,sendErr:"Erreur : "+e.message});});
}
function doDel(id){
  if(!confirm("Supprimer cette saisie ?"))return;
  sil({deleting:id});render();
  fbDel(id).then(function(){go({deleting:null,subs:(S.subs||[]).filter(function(s){return s.id!==id;})});})
           .catch(function(e){go({deleting:null,err:"Erreur : "+e.message});});
}
function doSaveEleves(){
  go({regSaving:true,regSaved:false});
  fbSaveEl(ELEVES).then(function(){go({regSaving:false,regSaved:true,elevesOpen:null});setTimeout(function(){go({regSaved:false});},3000);})
                  .catch(function(e){go({regSaving:false,err:"Erreur : "+e.message});});
}
function loadElevesConfig(){
  fbLoadEl().then(function(doc){
    if(doc.exists){
      var data=doc.data();
      if(data.eleves){var sv=data.eleves;Object.keys(sv).forEach(function(cl){if(ELEVES[cl]!==undefined)ELEVES[cl]=sv[cl];});}
      if(data.parents){Object.assign(PARENTS_MAP,data.parents);}
    }
  }).catch(function(){});
  fbLoadCheques().then(function(doc){
    if(doc.exists){var data=doc.data();if(data.cheques)Object.assign(CHEQUES_MAP,data.cheques);}
  }).catch(function(){});
  fbLoadAnnee().then(function(doc){
    if(doc.exists){
      var data=doc.data();
      if(data.rentree)RENTREE=data.rentree;
      if(data.annee)ANNEE=data.annee;
      TRI=buildTRI(RENTREE,ANNEE);
      document.title="Clardeluna "+ANNEE;
    }
  }).catch(function(){});
  fbLoadActs().then(function(doc){
    if(doc.exists){var data=doc.data();if(data.acts)Object.assign(ACTS,data.acts);}
  }).catch(function(){});
}
function doPromotion(){
  // Étape 1 : avertissement fort
  var msg="⚠️ PROMOTION ANNUELLE\n\n"+
    "Cette action va :\n"+
    "• Faire monter tous les élèves d'une classe\n"+
    "• SUPPRIMER toutes les heures saisies de l annee en cours\n\n"+
    "IMPORTANT : Avant de continuer, exportez le rapport PDF\n"+
    "(onglet Rapport - Imprimer / PDF) pour conserver une trace.\n\n"+
    "Avez-vous bien sauvegardé le rapport de l annee en cours ?";
  if(!confirm(msg))return;
  // Étape 2 : double confirmation
  if(!confirm("CONFIRMATION FINALE\n\nToutes les heures de l annee en cours seront EFFACÉES.\nCette action est irréversible.\n\nContinuer ?"))return;
  // Export CSV automatique avant suppression
  exportCsv();
  go({promoSaved:false,err:""});
  // Supprimer toutes les saisies Firebase
  db.collection("submissions").get().then(function(snap){
    var batch=db.batch();
    var count=0;
    snap.docs.forEach(function(doc){
      batch.delete(doc.ref);
      count++;
      // Firestore batch max 500
      if(count===499){batch.commit();batch=db.batch();count=0;}
    });
    return batch.commit();
  }).then(function(){
    // Promotion des classes
    var old={};Object.keys(ELEVES).forEach(function(cl){old[cl]=ELEVES[cl].slice();});
    // ── Avant de supprimer les 3ème : propager leurs parents aux fratries ──
    // Si un 3ème a un frère/sœur dans une autre classe, on s'assure que
    // les parents sont bien enregistrés sous le nom du frère/sœur aussi.
    var autresEleves=["6ème","5ème","4ème"].reduce(function(a,cl){return a.concat(old[cl]);},[]); 
    old["3ème"].forEach(function(e3){
      var parents3=PARENTS_MAP[e3];
      if(!parents3||!parents3.length)return;
      var fk3=familyKey(e3);
      // Chercher les frères/sœurs dans les autres classes
      autresEleves.forEach(function(e2){
        if(familyKey(e2)===fk3){
          // Même famille → copier les parents manquants
          if(!PARENTS_MAP[e2])PARENTS_MAP[e2]=[];
          parents3.forEach(function(p){
            if(PARENTS_MAP[e2].indexOf(p)===-1)PARENTS_MAP[e2].push(p);
          });
        }
      });
      delete PARENTS_MAP[e3];
    });
    // Décaler les listes d'élèves
    ELEVES["3ème"]=old["4ème"].slice();
    ELEVES["4ème"]=old["5ème"].slice();
    ELEVES["5ème"]=old["6ème"].slice();
    ELEVES["6ème"]=[];
    // Reconstruire PARENTS_MAP avec les élèves restants
    var newMap={};
    old["4ème"].forEach(function(e){if(PARENTS_MAP[e])newMap[e]=PARENTS_MAP[e];});
    old["5ème"].forEach(function(e){if(PARENTS_MAP[e])newMap[e]=PARENTS_MAP[e];});
    old["6ème"].forEach(function(e){if(PARENTS_MAP[e])newMap[e]=PARENTS_MAP[e];});
    PARENTS_MAP=newMap;
    // Remettre les chèques à zéro (ils sont annuels)
    CHEQUES_MAP={};
    return fbSaveEl(ELEVES).then(function(){return fbSaveCheques();});
  }).then(function(){
    // Remettre les compteurs à zéro dans l'état
    go({subs:[],promoSaved:true,aFilter:"all",aCls:"all"});
    setTimeout(function(){go({promoSaved:false});},6000);
  }).catch(function(e){
    go({err:"Erreur promotion : "+e.message});
  });
}
function exportCsv(){
  var subs=S.subs||[];
  var hd=["Horodatage","Classe","Élève","Parent(s)","Nb parents","Type","Sous-activité","Heures","Trimestre"];
  var rows=subs.map(function(s){return[new Date(s.ts).toLocaleString("fr-FR"),s.classe,s.eleve,s.parents,s.nbParents,s.activiteType,s.sousActivite,s.heures,"T"+(getTri(s.ts)||"?")];});
  var csv="\uFEFF"+[hd].concat(rows).map(function(r){return r.map(function(v){return'"'+String(v).replace(/"/g,'""')+'"';}).join(",");}).join("\n");
  var a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));a.download="clardeluna-heures-"+new Date().toLocaleDateString("fr-FR").replace(/\//g,"-")+".csv";a.click();
}
// ── DÉMARRAGE ─────────────────────────────────
function showErr(msg){
  var el=document.getElementById("app");
  el.style.cssText="max-width:460px;margin:40px auto;padding:20px;font-family:-apple-system,sans-serif";
  el.innerHTML='<div style="text-align:center;margin-bottom:20px"><div style="font-size:44px;margin-bottom:12px">⚠️</div>'+
    '<h2 style="font-size:17px;font-weight:700;margin-bottom:6px">Connexion Firebase impossible</h2>'+
    '<code style="font-size:12px;color:#C0472A;word-break:break-all">'+msg+'</code></div>'+
    '<div style="background:#FFF8E1;border:1px solid #F0D060;border-radius:8px;padding:14px;font-size:13px;color:#7A5800;margin-bottom:16px">'+
      '<p style="font-weight:700;margin-bottom:8px">Solutions :</p>'+
      '<p style="margin-bottom:6px">1. Activer Firestore (Firebase Console → Build → Firestore Database)</p>'+
      '<p style="margin-bottom:6px">2. Firestore → Règles → allow read, write: if true;</p>'+
      '<p>3. Vérifier la config Firebase dans index.html</p>'+
    '</div>'+
    '<button onclick="location.reload()" style="width:100%;padding:12px;background:#C0472A;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-weight:700">Réessayer</button>';
}
(function(){
  try{
    firebase.initializeApp(FB_CFG);
    db=firebase.firestore();
    var done=false;
    var timer=setTimeout(function(){if(!done)showErr("Timeout — Firebase ne répond pas.");},8000);
    db.collection("_ping").limit(1).get()
      .then(function(){done=true;clearTimeout(timer);go({page:"home"});loadElevesConfig();})
      .catch(function(e){done=true;clearTimeout(timer);showErr(e.message);});
  }catch(e){showErr(e.message);}
})();
</script>
